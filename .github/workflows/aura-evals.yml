name: Aura Functional Evals

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_live_benchmark:
        description: "Run the live autonomous-build benchmark lane"
        required: false
        default: false
        type: boolean

jobs:
  smoke:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: interface

    steps:
      - uses: actions/checkout@v5

      - name: Install Node.js
        uses: ./.github/actions/setup-node
        with:
          cache: npm
          cache-dependency-path: interface/package-lock.json

      - name: Run smoke evals entrypoint
        if: always()
        run: node ../scripts/ci/verify-evals.mjs smoke

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: aura-evals-smoke
          path: |
            interface/playwright-report
            interface/test-results

  workflow-e2e:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: interface

    steps:
      - uses: actions/checkout@v5

      - name: Install Node.js
        uses: ./.github/actions/setup-node
        with:
          cache: npm
          cache-dependency-path: interface/package-lock.json

      - name: Run workflow evals entrypoint
        if: always()
        run: node ../scripts/ci/verify-evals.mjs workflow

      - name: Upload workflow artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: aura-evals-workflow
          path: |
            interface/playwright-report
            interface/test-results

  behavior-evals:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra/evals/promptfoo

    steps:
      - uses: actions/checkout@v5

      - name: Install Node.js
        uses: ./.github/actions/setup-node
        with:
          cache: npm
          cache-dependency-path: infra/evals/promptfoo/package-lock.json

      - name: Run behavior evals entrypoint
        run: node ../../../scripts/ci/verify-evals.mjs behavior

      - name: Upload behavior eval artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: aura-evals-behavior
          path: |
            infra/evals/reports/promptfoo-results.json

  live-benchmark:
    if: github.event_name == 'workflow_dispatch' && inputs.run_live_benchmark
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: interface

    steps:
      - uses: actions/checkout@v5

      - name: Install Node.js
        uses: ./.github/actions/setup-node
        with:
          cache: npm
          cache-dependency-path: interface/package-lock.json

      - name: Run live benchmark entrypoint
        if: always()
        env:
          AURA_EVAL_BASE_URL: ${{ secrets.AURA_EVAL_BASE_URL }}
          AURA_EVAL_USER_EMAIL: ${{ secrets.AURA_EVAL_USER_EMAIL }}
          AURA_EVAL_USER_PASSWORD: ${{ secrets.AURA_EVAL_USER_PASSWORD }}
        run: node ../scripts/ci/verify-evals.mjs live-benchmark

      - name: Upload live benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: aura-evals-live-benchmark
          path: |
            interface/playwright-report
            interface/test-results
