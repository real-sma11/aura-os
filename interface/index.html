<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="light dark" />
    <link rel="icon" type="image/png" href="/aura-icon.png" />
    <link rel="manifest" id="aura-manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <!--
      Single theme-color tag we own; the inline boot script below and the
      React BrowserChromeThemeBridge keep its content (and the manifest
      link's href) in sync with the ZUI ThemeProvider's resolved theme so
      the browser tab/URL-bar chrome follows AURA's in-app light/dark
      choice rather than the OS-level prefers-color-scheme.
    -->
    <meta name="theme-color" id="aura-theme-color" content="#05070d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <script>
      // Stamp <html data-theme="..."> before any CSS or React boots so the
      // first paint matches the user's persisted ZUI ThemeProvider choice
      // (avoids a dark <-> light flash). Mirrors the storage shape
      // ThemeProvider writes to localStorage["zui-theme"]. Also points
      // the theme-color meta and PWA manifest link at the right palette
      // so the browser chrome (Chrome tab thumbnail, mobile URL bar,
      // installed-PWA window) is correct on the very first frame; the
      // BrowserChromeThemeBridge React component keeps these in sync on
      // subsequent theme flips.
      (function () {
        try {
          var raw = localStorage.getItem('zui-theme');
          var theme = 'dark';
          if (raw) {
            var parsed = JSON.parse(raw);
            if (parsed && typeof parsed.theme === 'string') theme = parsed.theme;
          }
          if (theme === 'system') {
            theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          if (theme !== 'dark' && theme !== 'light') theme = 'dark';
          document.documentElement.setAttribute('data-theme', theme);
          var color = theme === 'light' ? '#ffffff' : '#05070d';
          var manifestHref = theme === 'light' ? '/manifest-light.webmanifest' : '/manifest.webmanifest';
          var meta = document.getElementById('aura-theme-color');
          if (meta) meta.setAttribute('content', color);
          var manifest = document.getElementById('aura-manifest');
          if (manifest) manifest.setAttribute('href', manifestHref);
        } catch (_) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <style>
      /*
       * The splash is no longer a loading banner during a normal boot — the
       * native window reveals directly to ready app content. It is kept only
       * as the container for the boot-error fallback below, so it stays hidden
       * unless `html.aura-boot-error` is set.
       */
      #aura-splash {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: none;
        place-items: center;
        background:
          radial-gradient(circle at 50% 42%, rgba(124, 58, 237, 0.18), transparent 32rem),
          #000;
        color: #f8fafc;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        pointer-events: none;
      }

      #aura-splash .aura-splash-mark {
        display: grid;
        gap: 18px;
        justify-items: center;
        letter-spacing: 0.42em;
        text-indent: 0.42em;
        font-size: 18px;
        font-weight: 700;
      }

      #aura-splash .aura-splash-pulse {
        width: 116px;
        height: 2px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.12);
      }

      #aura-splash .aura-splash-pulse::before {
        content: "";
        display: block;
        width: 42%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, transparent, rgba(168, 85, 247, 0.95), transparent);
        animation: aura-splash-scan 900ms ease-in-out infinite;
      }

      #aura-splash .aura-boot-error {
        display: none;
        max-width: 420px;
        text-align: center;
        letter-spacing: 0;
        text-indent: 0;
        color: rgba(248, 250, 252, 0.86);
      }

      #aura-splash .aura-boot-error-title {
        margin-top: 2px;
        font-size: 14px;
        font-weight: 700;
      }

      #aura-splash .aura-boot-error-detail,
      #aura-splash .aura-boot-error-action {
        margin-top: 8px;
        font-size: 12px;
        line-height: 1.5;
        color: rgba(226, 232, 240, 0.72);
      }

      html.aura-boot-error #aura-splash {
        display: grid;
      }

      html.aura-boot-error #aura-splash .aura-splash-pulse {
        display: none;
      }

      html.aura-boot-error #aura-splash .aura-boot-error {
        display: block;
      }

      [data-theme='light'] #aura-splash {
        background:
          radial-gradient(circle at 50% 42%, rgba(124, 58, 237, 0.12), transparent 32rem),
          #ffffff;
        color: #0f172a;
      }

      [data-theme='light'] #aura-splash .aura-splash-pulse {
        background: rgba(15, 23, 42, 0.12);
      }

      [data-theme='light'] #aura-splash .aura-boot-error {
        color: rgba(15, 23, 42, 0.86);
      }

      [data-theme='light'] #aura-splash .aura-boot-error-detail,
      [data-theme='light'] #aura-splash .aura-boot-error-action {
        color: rgba(30, 41, 59, 0.72);
      }

      @keyframes aura-splash-scan {
        from {
          transform: translateX(-100%);
        }
        to {
          transform: translateX(240%);
        }
      }

      /*
       * Fallback titlebar shown over the splash / boot-error overlay so the
       * frameless desktop window stays draggable and closable even when the
       * React bundle never mounts (e.g. dev server unreachable, Vite import
       * error). React's DesktopTitlebar / WindowControls take over once
       * `html.aura-app-ready` is set in main.tsx#hideBootSplash.
       */
      #aura-fallback-titlebar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 32px;
        z-index: 2147483647;
        display: flex;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: rgba(248, 250, 252, 0.86);
        user-select: none;
        -webkit-user-select: none;
      }

      #aura-fallback-titlebar .aura-ftb-drag {
        flex: 1;
        -webkit-app-region: drag;
      }

      #aura-fallback-titlebar .aura-ftb-controls {
        display: flex;
        -webkit-app-region: no-drag;
      }

      #aura-fallback-titlebar .aura-ftb-btn {
        appearance: none;
        background: transparent;
        border: 0;
        margin: 0;
        padding: 0;
        width: 46px;
        height: 32px;
        color: inherit;
        font-size: 12px;
        line-height: 1;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-app-region: no-drag;
      }

      #aura-fallback-titlebar .aura-ftb-btn:hover {
        background: rgba(255, 255, 255, 0.08);
      }

      #aura-fallback-titlebar .aura-ftb-btn:focus-visible {
        outline: 1px solid rgba(168, 85, 247, 0.7);
        outline-offset: -2px;
      }

      #aura-fallback-titlebar .aura-ftb-close:hover {
        background: #c42b1c;
        color: #fff;
      }

      html.aura-app-ready #aura-fallback-titlebar {
        display: none;
      }

      [data-theme='light'] #aura-fallback-titlebar {
        color: rgba(15, 23, 42, 0.86);
      }

      [data-theme='light'] #aura-fallback-titlebar .aura-ftb-btn:hover {
        background: rgba(15, 23, 42, 0.08);
      }

      [data-theme='light'] #aura-fallback-titlebar .aura-ftb-close:hover {
        background: #c42b1c;
        color: #fff;
      }
    </style>
    <title>AURA</title>
  </head>
  <body>
    <div id="aura-splash" aria-hidden="true">
      <div class="aura-splash-mark">
        <div>AURA</div>
        <div class="aura-splash-pulse"></div>
        <div class="aura-boot-error" role="status" aria-live="polite">
          <div class="aura-boot-error-title" id="aura-boot-error-title">
            AURA is taking longer than expected to start.
          </div>
          <div class="aura-boot-error-detail" id="aura-boot-error-detail">
            Waiting for the app bundle to load.
          </div>
          <div class="aura-boot-error-action">
            Restart AURA. If this keeps happening, install the latest build and report this message.
          </div>
        </div>
      </div>
    </div>
    <div id="aura-fallback-titlebar" aria-hidden="true">
      <div class="aura-ftb-drag"></div>
      <div class="aura-ftb-controls">
        <button
          type="button"
          class="aura-ftb-btn"
          data-cmd="minimize"
          aria-label="Minimize window"
          title="Minimize"
        >&#x2013;</button>
        <button
          type="button"
          class="aura-ftb-btn"
          data-cmd="maximize"
          aria-label="Maximize window"
          title="Maximize"
        >&#x25A1;</button>
        <button
          type="button"
          class="aura-ftb-btn aura-ftb-close"
          data-cmd="close"
          aria-label="Close window"
          title="Close"
        >&#x2715;</button>
      </div>
    </div>
    <div id="root"></div>
    <script>
      (function () {
        var timeoutId = 0;
        var currentPhase = "loading app bundle";

        function setText(id, text) {
          var node = document.getElementById(id);
          if (node) node.textContent = text;
        }

        function showBootError(message, detail) {
          if (document.documentElement.classList.contains("aura-app-ready")) return;
          setText("aura-boot-error-title", message || "AURA could not finish starting.");
          setText("aura-boot-error-detail", detail || "Startup stopped before the app became ready.");
          document.documentElement.classList.add("aura-boot-error");
        }

        window.__AURA_BOOT_STATUS__ = {
          mark: function (phase) {
            currentPhase = phase || currentPhase;
            setText("aura-boot-error-detail", "Current step: " + currentPhase + ".");
          },
          fail: function (message, detail) {
            showBootError(message, detail);
          },
          clear: function () {
            if (timeoutId) window.clearTimeout(timeoutId);
            document.documentElement.classList.remove("aura-boot-error");
          },
        };

        window.addEventListener(
          "error",
          function (event) {
            var target = event.target;
            var source = target && (target.src || target.href);
            showBootError(
              "AURA hit a startup error.",
              event.message || (source ? "Failed to load " + source : "A startup resource failed to load.")
            );
          },
          true
        );

        window.addEventListener("unhandledrejection", function (event) {
          var reason = event.reason;
          var detail = reason && reason.message ? reason.message : "A startup promise failed.";
          showBootError("AURA hit a startup error.", detail);
        });

        timeoutId = window.setTimeout(function () {
          showBootError(
            "AURA is taking longer than expected to start.",
            "Current step: " + currentPhase + "."
          );
        }, 20000);

        // Wire the fallback titlebar to the same IPC bridge wry exposes for
        // the React WindowControls component. window.ipc is installed before
        // any frontend script runs, so these controls work even when the
        // bundle never loads. No-op in the browser dev/test contexts where
        // window.ipc is undefined.
        function postWindowCommand(cmd) {
          var ipc = window.ipc;
          if (ipc && typeof ipc.postMessage === "function") {
            ipc.postMessage(cmd);
          }
        }

        var fallbackBar = document.getElementById("aura-fallback-titlebar");
        if (fallbackBar) {
          fallbackBar.addEventListener("click", function (event) {
            var target = event.target;
            if (!target || typeof target.closest !== "function") return;
            var btn = target.closest(".aura-ftb-btn");
            if (!btn) return;
            var cmd = btn.getAttribute("data-cmd");
            if (cmd) postWindowCommand(cmd);
          });

          // Mirrors interface/src/lib/native-titlebar-drag.ts: WebView2 on
          // Windows already starts a native drag via -webkit-app-region, so
          // adding a JS-initiated drag there would race with it. On macOS
          // WKWebView and Linux WebKitGTK the CSS rule is ignored and we
          // need this pointerdown -> IPC fallback for the drag region to work.
          var ua = (typeof navigator !== "undefined" && navigator.userAgent) || "";
          var isWindows = /Windows NT/i.test(ua);
          if (!isWindows) {
            var dragRegion = fallbackBar.querySelector(".aura-ftb-drag");
            if (dragRegion) {
              dragRegion.addEventListener("pointerdown", function (event) {
                if (event.button !== 0) return;
                postWindowCommand("drag");
              });
            }
          }
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
