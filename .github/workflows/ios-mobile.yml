name: iOS Validation + TestFlight/App Store

on:
  push:
    branches:
      - main
      - codex/mobile-ios-shell-clean
      - codex/mobile-store-integration
  pull_request:
    paths:
      - .github/actions/**
      - .github/workflows/ios-mobile.yml
      - interface/**
      - README.md
  workflow_dispatch:
    inputs:
      lane:
        description: "fastlane lane to run"
        required: true
        default: beta
        type: choice
        options:
          - preflight
          - bootstrap_signing
          - beta
          - release
      submit_for_review:
        description: "Only applies to the release lane"
        required: false
        default: false
        type: boolean
      changelog:
        description: "Optional TestFlight changelog"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: ios-mobile-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-ios-shell:
    if: github.event_name != 'workflow_dispatch'
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v5

      - name: Install Node.js
        uses: ./.github/actions/setup-node
        with:
          cache: npm
          cache-dependency-path: interface/package-lock.json

      # Apple requires the iOS 26 SDK (Xcode 26+) for any App Store Connect
      # upload as of 2026-04-28. Pin the runner toolchain explicitly so PR
      # validation matches what `ship-ios` will archive against.
      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.4.app

      - name: Print Xcode and SDK versions
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Run iOS validation entrypoint
        run: node scripts/ci/verify-ios.mjs

      - name: Attach iOS validation summary
        shell: bash
        run: cat mobile-release-summary/ios-validate-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload iOS validation artifacts
        uses: actions/upload-artifact@v5
        with:
          name: ios-validate-artifacts
          if-no-files-found: ignore
          path: |
            mobile-release-summary/**
            /tmp/aura-ios-validate/Build/Products/**/*.app

  ship-ios:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: macos-26
    env:
      FASTLANE_SKIP_UPDATE_CHECK: "1"
      IOS_APP_STORE_CONNECT_KEY_ID: ${{ secrets.IOS_APP_STORE_CONNECT_KEY_ID }}
      IOS_APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.IOS_APP_STORE_CONNECT_ISSUER_ID }}
      IOS_APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.IOS_APP_STORE_CONNECT_KEY_BASE64 }}
      IOS_APP_STORE_CONNECT_TEAM_ID: ${{ secrets.IOS_APP_STORE_CONNECT_TEAM_ID }}
      IOS_APPLE_ID: ${{ secrets.IOS_APPLE_ID }}
      IOS_BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID }}
      IOS_BUILD_NUMBER: ${{ github.run_number }}
      IOS_CHANGELOG: ${{ github.event_name == 'workflow_dispatch' && inputs.changelog || '' }}
      IOS_DEVELOPER_TEAM_ID: ${{ secrets.IOS_DEVELOPER_TEAM_ID }}
      IOS_MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.IOS_MATCH_GIT_BASIC_AUTHORIZATION }}
      IOS_MATCH_GIT_BRANCH: ${{ secrets.IOS_MATCH_GIT_BRANCH }}
      IOS_MATCH_GIT_PRIVATE_KEY: ${{ secrets.IOS_MATCH_GIT_PRIVATE_KEY }}
      IOS_MATCH_GIT_URL: ${{ secrets.IOS_MATCH_GIT_URL }}
      IOS_SUBMIT_FOR_REVIEW: ${{ github.event_name == 'workflow_dispatch' && inputs.submit_for_review && '1' || '0' }}
      MATCH_PASSWORD: ${{ secrets.IOS_MATCH_PASSWORD }}
      VITE_IOS_DEFAULT_HOST: ${{ vars.VITE_IOS_DEFAULT_HOST }}
      VITE_NATIVE_DEFAULT_HOST: ${{ vars.VITE_NATIVE_DEFAULT_HOST }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Node.js
        uses: ./.github/actions/setup-node
        with:
          cache: npm
          cache-dependency-path: interface/package-lock.json

      - name: Install Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.2"

      # Apple requires the iOS 26 SDK (Xcode 26+) for any App Store Connect
      # upload as of 2026-04-28; otherwise altool rejects the IPA with a 409.
      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.4.app

      - name: Print Xcode and SDK versions
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Check iOS runtime parity
        run: node scripts/ci/check-runtime.mjs ios --native --ruby

      - name: Install interface dependencies
        working-directory: interface
        run: npm ci

      - name: Install fastlane gems
        working-directory: interface/ios
        run: bundle install --jobs 4 --retry 3

      - name: Resolve iOS host defaults
        shell: bash
        run: |
          DEFAULT_HOST="${VITE_NATIVE_DEFAULT_HOST:-https://aura-os-t565.onrender.com}"
          echo "VITE_NATIVE_DEFAULT_HOST=${DEFAULT_HOST}" >> "$GITHUB_ENV"
          echo "VITE_IOS_DEFAULT_HOST=${VITE_IOS_DEFAULT_HOST:-$DEFAULT_HOST}" >> "$GITHUB_ENV"

      - name: Compute app version
        id: version
        shell: bash
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          LANE="${{ github.event_name == 'workflow_dispatch' && inputs.lane || 'beta' }}"
          CHANNEL="beta"
          case "$LANE" in
            release) CHANNEL="stable" ;;
            beta) CHANNEL="beta" ;;
            preflight|bootstrap_signing) CHANNEL="preflight" ;;
          esac
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "main" ]; then
            VERSION="${CHANNEL}.${SHORT_SHA}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "channel=${CHANNEL}" >> "$GITHUB_OUTPUT"

      - name: Run requested or automatic iOS lanes
        timeout-minutes: 60
        working-directory: interface/ios
        env:
          APP_COMMIT: ${{ github.sha }}
        shell: bash
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)

          if [ "${{ github.event_name }}" = "push" ]; then
            beta_build_number=$(( ${{ github.run_number }} * 10 + 1 ))

            APP_VERSION="beta.${SHORT_SHA}" \
            APP_CHANNEL="beta" \
            IOS_BUILD_NUMBER="$beta_build_number" \
            bundle exec fastlane ios beta

            # Keep App Store submission manual-only for now.
            # Re-enable this block if we decide main pushes should also drive the
            # release lane automatically again.
            #
            # release_build_number=$(( ${{ github.run_number }} * 10 + 2 ))
            # APP_VERSION="stable.${SHORT_SHA}" \
            # APP_CHANNEL="stable" \
            # IOS_BUILD_NUMBER="$release_build_number" \
            # IOS_SUBMIT_FOR_REVIEW="1" \
            # bundle exec fastlane ios release

            exit 0
          fi

          lane="${{ inputs.lane }}"
          channel="beta"
          case "$lane" in
            release) channel="stable" ;;
            beta) channel="beta" ;;
            preflight|bootstrap_signing) channel="preflight" ;;
          esac

          APP_VERSION="${channel}.${SHORT_SHA}" \
          APP_CHANNEL="$channel" \
          bundle exec fastlane ios "$lane"

      - name: Summarize iOS release outputs
        run: |
          node infra/scripts/release/mobile-release-summary.mjs \
            --platform ios \
            --mode ship \
            --output-dir mobile-release-summary \
            --roots interface/ios/build

      - name: Attach iOS release summary
        shell: bash
        run: cat mobile-release-summary/ios-ship-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload iOS release artifacts
        uses: actions/upload-artifact@v5
        with:
          name: ios-release-artifacts
          if-no-files-found: ignore
          path: |
            mobile-release-summary/**
            interface/ios/build/**/*.ipa
            interface/ios/build/**/*.app
            interface/ios/build/**/*.xcarchive

      - name: Upload iOS build logs on failure
        if: failure() || cancelled()
        uses: actions/upload-artifact@v5
        with:
          name: ios-release-logs
          if-no-files-found: ignore
          path: |
            /Users/runner/Library/Logs/gym/**
            interface/ios/build/**
