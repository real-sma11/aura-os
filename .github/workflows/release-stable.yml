name: Desktop Stable Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.0.0)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  AURA_UPDATE_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}

jobs:
  build-sidecar:
    env:
      # Place the sidecar Cargo target inside GITHUB_WORKSPACE so that
      # Swatinem/rust-cache and upload-artifact can access it. The true-sibling
      # aura-harness checkout (../aura-harness) is outside the workspace
      # boundary enforced by actions/cache v4 / upload-artifact@v5.
      CARGO_TARGET_DIR: .aura-harness-target
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            arch: x86_64
          - os: macos-latest
            target: macos
            arch: aarch64
          - os: macos-15-intel
            target: macos
            arch: x86_64
          - os: windows-latest
            target: windows
            arch: x86_64

    runs-on: ${{ matrix.os == 'windows-latest' && 'aura-os-windows-x64-large' || matrix.os == 'ubuntu-latest' && 'aura-os-linux-x64-large' || matrix.os == 'macos-15-intel' && 'macos-15-large' || matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Prepare harness sibling workspace
        uses: ./.github/actions/setup-harness-sibling
        with:
          repository-owner: ${{ github.repository_owner }}
          include-harness: "true"

      - name: Install Rust toolchain
        uses: ./.github/actions/setup-rust-toolchain

      - name: Restore sidecar Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: desktop-sidecar-${{ runner.os }}-${{ runner.arch }}
          workspaces: |
            ../aura-harness -> .aura-harness-target

      - name: Set up sccache
        id: sccache-sidecar
        uses: mozilla-actions/sccache-action@v0.0.9
        continue-on-error: true

      - name: Configure sccache backend
        if: steps.sccache-sidecar.outcome == 'success'
        shell: bash
        env:
          DEPOT_CACHE_TOKEN: ${{ secrets.DEPOT_CACHE_TOKEN }}
        run: |
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          if [ -n "$DEPOT_CACHE_TOKEN" ]; then
            echo "SCCACHE_WEBDAV_ENDPOINT=https://cache.depot.dev" >> "$GITHUB_ENV"
            echo "SCCACHE_WEBDAV_TOKEN=$DEPOT_CACHE_TOKEN" >> "$GITHUB_ENV"
          else
            echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          fi

      - name: Install Linux runner dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang pkg-config libatomic1 libssl-dev libdbus-1-dev

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 25.9.0

      - name: Verify runner architecture
        if: matrix.target == 'linux'
        shell: bash
        run: |
          actual_arch="$(uname -m)"
          expected_arch="${{ matrix.arch }}"
          if [ "$actual_arch" != "$expected_arch" ]; then
            echo "Expected Linux runner architecture $expected_arch but got $actual_arch" >&2
            exit 1
          fi

      - name: Check desktop runtime parity
        run: node scripts/ci/check-runtime.mjs desktop --require-harness

      - name: Validate desktop auto-update sidecar contract
        run: |
          node --test infra/scripts/release/prepare-desktop-sidecar.test.mjs
          node infra/scripts/release/prepare-desktop-sidecar.mjs --check

      - name: Build bundled aura-node sidecar
        run: node infra/scripts/release/prepare-desktop-sidecar.mjs

      - name: Show sccache stats
        if: always() && steps.sccache-sidecar.outcome == 'success'
        shell: bash
        run: |
          "${SCCACHE_PATH}" --show-stats || sccache --show-stats || true

      - name: Archive bundled sidecar
        shell: bash
        run: |
          tar -cf desktop-sidecar.tar -C apps/aura-os-desktop/resources sidecar

      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v5
        with:
          name: sidecar-${{ matrix.target }}-${{ matrix.arch }}
          path: desktop-sidecar.tar
          compression-level: 0

  build-app:
    env:
      CARGO_TARGET_DIR: ../.aura-shared-target
      AURA_RELEASE_DIR: ../.aura-shared-target/release
      AURA_NETWORK_URL: ${{ vars.AURA_NETWORK_URL }}
      AURA_STORAGE_URL: ${{ vars.AURA_STORAGE_URL }}
      AURA_INTEGRATIONS_URL: ${{ vars.AURA_INTEGRATIONS_URL }}
      AURA_ROUTER_URL: ${{ vars.AURA_ROUTER_URL }}
      Z_BILLING_URL: ${{ vars.Z_BILLING_URL }}
      ORBIT_BASE_URL: ${{ vars.ORBIT_BASE_URL }}
      SWARM_BASE_URL: ${{ vars.SWARM_BASE_URL }}
      REQUIRE_ZERO_PRO: ${{ vars.REQUIRE_ZERO_PRO }}
      AURA_DISABLE_LOCAL_HARNESS_AUTOSPAWN: ${{ vars.AURA_DISABLE_LOCAL_HARNESS_AUTOSPAWN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            arch: x86_64
          - os: macos-latest
            target: macos
            arch: aarch64
          - os: macos-15-intel
            target: macos
            arch: x86_64
          - os: windows-latest
            target: windows
            arch: x86_64

    runs-on: ${{ matrix.os == 'windows-latest' && 'aura-os-windows-x64-large' || matrix.os == 'ubuntu-latest' && 'aura-os-linux-x64-large' || matrix.os == 'macos-15-intel' && 'macos-15-large' || matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: ./.github/actions/setup-rust-toolchain

      - name: Restore desktop Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: desktop-app-${{ runner.os }}-${{ runner.arch }}
          workspaces: |
            . -> target

      - name: Set up sccache
        id: sccache-app
        uses: mozilla-actions/sccache-action@v0.0.9
        continue-on-error: true

      - name: Configure sccache backend
        if: steps.sccache-app.outcome == 'success'
        shell: bash
        env:
          DEPOT_CACHE_TOKEN: ${{ secrets.DEPOT_CACHE_TOKEN }}
        run: |
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          if [ -n "$DEPOT_CACHE_TOKEN" ]; then
            echo "SCCACHE_WEBDAV_ENDPOINT=https://cache.depot.dev" >> "$GITHUB_ENV"
            echo "SCCACHE_WEBDAV_TOKEN=$DEPOT_CACHE_TOKEN" >> "$GITHUB_ENV"
          else
            echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          fi

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang pkg-config libatomic1 libssl-dev libdbus-1-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 25.9.0
          cache: npm
          cache-dependency-path: interface/package-lock.json

      - name: Verify runner architecture
        if: matrix.target == 'linux'
        shell: bash
        run: |
          actual_arch="$(uname -m)"
          expected_arch="${{ matrix.arch }}"
          if [ "$actual_arch" != "$expected_arch" ]; then
            echo "Expected Linux runner architecture $expected_arch but got $actual_arch" >&2
            exit 1
          fi

      - name: Check desktop runtime parity
        run: node scripts/ci/check-runtime.mjs desktop

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Patch Cargo.toml version
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i.bak "s/^version = \".*\"/version = \"${VERSION}\"/" apps/aura-os-desktop/Cargo.toml
          rm -f apps/aura-os-desktop/Cargo.toml.bak

      - name: Build interface
        working-directory: interface
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
          APP_COMMIT: ${{ github.sha }}
          APP_CHANNEL: stable
        run: |
          npm ci
          npm run build
          node ../infra/scripts/release/desktop-frontend-assets-validate.mjs --dist dist

      - name: Build release binary
        env:
          AURA_DESKTOP_USE_PREBUILT_FRONTEND: "1"
          AURA_UPDATE_BASE_URL: ${{ env.AURA_UPDATE_BASE_URL }}
          UPDATER_PUBLIC_KEY: ${{ secrets.CARGO_PACKAGER_SIGN_PUBLIC_KEY }}
          AURA_CARGO_TIMINGS: ${{ (matrix.target == 'windows' || (matrix.target == 'macos' && matrix.arch == 'x86_64')) && '1' || '' }}
        shell: bash
        # `--no-default-features --features stable-channel` is required: the
        # default features on aura-os-desktop are `dev-channel`, so plain
        # `cargo build` would produce a Dev binary (window title "AURA Dev",
        # `aura-dev` data dir, dev ports, in-app updater disabled). The
        # packaged installer ships the binary built here verbatim via the
        # `binaries-dir` injection in the package job.
        #
        # The flag alone is not sufficient: every library crate must also
        # depend on `aura-os-core` with `default-features = false`, and
        # `aura-os-core` itself must have no default channel. Otherwise
        # Cargo feature unification re-activates `dev-channel` through a
        # transitive dep and produces a Dev-in-disguise stable binary.
        # `scripts/ci/verify-desktop.mjs` invokes the just-built binary
        # with `--print-channel` and fails the lane if it doesn't report
        # `channel=Stable`, so a regression here turns the release red
        # instead of shipping silently.
        run: |
          args=(build --release --no-default-features --features stable-channel --package aura-os-desktop)
          if [ -n "$AURA_CARGO_TIMINGS" ]; then
            args+=(--timings)
          fi
          cargo "${args[@]}"

      - name: Show sccache stats
        if: always() && steps.sccache-app.outcome == 'success'
        shell: bash
        run: |
          "${SCCACHE_PATH}" --show-stats || sccache --show-stats || true

      - name: Stage Cargo timings
        if: always() && (matrix.target == 'windows' || (matrix.target == 'macos' && matrix.arch == 'x86_64'))
        shell: bash
        run: |
          rm -rf cargo-timings-upload
          if [ -d ../.aura-shared-target/cargo-timings ]; then
            mkdir -p cargo-timings-upload
            cp -R ../.aura-shared-target/cargo-timings/. cargo-timings-upload/
          fi

      - name: Upload Cargo timings
        if: always() && (matrix.target == 'windows' || (matrix.target == 'macos' && matrix.arch == 'x86_64'))
        uses: actions/upload-artifact@v5
        with:
          name: cargo-timings-stable-build-app-${{ matrix.target }}-${{ matrix.arch }}
          path: cargo-timings-upload
          if-no-files-found: warn

      - name: Archive desktop build inputs
        shell: bash
        run: |
          mkdir -p build-inputs/prebuilt-binaries build-inputs/interface
          binary_name="aura-os-desktop"
          if [ "${{ matrix.target }}" = "windows" ]; then
            binary_name="${binary_name}.exe"
          fi
          cp "$AURA_RELEASE_DIR/${binary_name}" "build-inputs/prebuilt-binaries/${binary_name}"
          cp -R interface/dist build-inputs/interface/dist
          tar -cf desktop-build-inputs.tar -C build-inputs .

      - name: Upload desktop build inputs
        uses: actions/upload-artifact@v5
        with:
          name: build-inputs-${{ matrix.target }}-${{ matrix.arch }}
          path: desktop-build-inputs.tar
          compression-level: 0

  package:
    needs: [build-sidecar, build-app]
    env:
      CARGO_TARGET_DIR: ../.aura-shared-target
      AURA_RELEASE_DIR: ../.aura-shared-target/release
      MACOS_DEVELOPER_ID_P12_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_P12_BASE64 }}
      MACOS_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_P12_PASSWORD }}
      MACOS_DEVELOPER_TEAM_ID: ${{ secrets.MACOS_DEVELOPER_TEAM_ID }}
      IOS_APP_STORE_CONNECT_KEY_ID: ${{ secrets.IOS_APP_STORE_CONNECT_KEY_ID }}
      IOS_APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.IOS_APP_STORE_CONNECT_ISSUER_ID }}
      IOS_APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.IOS_APP_STORE_CONNECT_KEY_BASE64 }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            arch: x86_64
          - os: macos-latest
            target: macos
            arch: aarch64
          - os: macos-15-intel
            target: macos
            arch: x86_64
          - os: windows-latest
            target: windows
            arch: x86_64

    runs-on: ${{ matrix.os == 'windows-latest' && 'aura-os-windows-x64-large' || matrix.os == 'ubuntu-latest' && 'aura-os-linux-x64-large' || matrix.os == 'macos-15-intel' && 'macos-15-large' || matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: ./.github/actions/setup-rust-toolchain

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang pkg-config libatomic1 libssl-dev libdbus-1-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 25.9.0

      - name: Verify runner architecture
        if: matrix.target == 'linux'
        shell: bash
        run: |
          actual_arch="$(uname -m)"
          expected_arch="${{ matrix.arch }}"
          if [ "$actual_arch" != "$expected_arch" ]; then
            echo "Expected Linux runner architecture $expected_arch but got $actual_arch" >&2
            exit 1
          fi

      - name: Check desktop runtime parity
        run: node scripts/ci/check-runtime.mjs desktop

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Patch Cargo.toml version
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i.bak "s/^version = \".*\"/version = \"${VERSION}\"/" apps/aura-os-desktop/Cargo.toml
          rm -f apps/aura-os-desktop/Cargo.toml.bak

      - name: Install cargo-packager
        uses: baptiste0928/cargo-install@v3
        with:
          crate: cargo-packager
          version: 0.11.8

      - name: Download sidecar artifact
        uses: actions/download-artifact@v5
        with:
          name: sidecar-${{ matrix.target }}-${{ matrix.arch }}
          path: downloaded-sidecar

      - name: Download desktop build inputs
        uses: actions/download-artifact@v5
        with:
          name: build-inputs-${{ matrix.target }}-${{ matrix.arch }}
          path: downloaded-build-inputs

      - name: Restore packaged resources and prebuilt binary
        shell: bash
        run: |
          rm -rf apps/aura-os-desktop/resources/sidecar interface/dist prebuilt-binaries
          mkdir -p apps/aura-os-desktop/resources
          tar -xf downloaded-sidecar/desktop-sidecar.tar -C apps/aura-os-desktop/resources
          tar -xf downloaded-build-inputs/desktop-build-inputs.tar
          test -d apps/aura-os-desktop/resources/sidecar
          test -d interface/dist
          node infra/scripts/release/desktop-frontend-assets-validate.mjs --dist interface/dist
          binary_name="aura-os-desktop"
          if [ "${{ matrix.target }}" = "windows" ]; then
            binary_name="${binary_name}.exe"
          fi
          test -f "prebuilt-binaries/${binary_name}"
          if [ "${{ matrix.target }}" != "windows" ]; then
            chmod 755 "prebuilt-binaries/${binary_name}"
            chmod 755 apps/aura-os-desktop/resources/sidecar/aura-node
          fi

      - name: Inject prebuilt binaries dir into packager config
        shell: bash
        run: |
          python3 <<'PY'
          import re
          from pathlib import Path

          cargo_toml = Path("apps/aura-os-desktop/Cargo.toml")
          text = cargo_toml.read_text(encoding="utf-8")
          binaries_line = 'binaries-dir = "../../prebuilt-binaries"'

          if "binaries-dir =" in text:
              text = re.sub(r'^binaries-dir = ".*"$', binaries_line, text, flags=re.MULTILINE)
          else:
              marker = "[package.metadata.packager]\n"
              if marker not in text:
                  raise SystemExit("Missing [package.metadata.packager] section in Cargo.toml")
              text = text.replace(marker, marker + binaries_line + "\n", 1)

          cargo_toml.write_text(text, encoding="utf-8")
          PY

      - name: Disable Spotlight indexing for DMG packaging
        if: matrix.target == 'macos'
        shell: bash
        # Spotlight (mds / mdworker_shared) holds open file handles on freshly
        # mounted DMGs, which makes `hdiutil detach` fail with `Resource busy`
        # at the end of `create-dmg`. Disabling indexing for the runner keeps
        # cargo-packager's DMG step from getting wedged.
        run: |
          sudo mdutil -a -i off || true
          sudo mdutil -i off /Volumes || true

      - name: Clean stale macOS DMG mounts
        if: matrix.target == 'macos'
        shell: bash
        run: python3 infra/scripts/release/cleanup-stale-macos-dmg.py

      - name: Install patched create-dmg script
        if: matrix.target == 'macos'
        shell: bash
        # cargo-packager 0.11.8 only downloads upstream create-dmg v1.1.1 if the
        # cache file does not exist. Pre-seeding the cache with our patched copy
        # (-nobrowse on attach, -force on detach retries) is what fixes the
        # recurring `hdiutil: couldn't eject ... Resource busy` failure on the
        # macOS Intel runner.
        run: bash infra/scripts/release/install-patched-create-dmg.sh

      - name: Prepare macOS signing inputs
        if: matrix.target == 'macos'
        shell: bash
        run: |
          python3 <<'PY'
          import base64
          import os
          import re
          import subprocess
          import tempfile
          from pathlib import Path

          required = [
              "MACOS_DEVELOPER_ID_P12_BASE64",
              "MACOS_DEVELOPER_ID_P12_PASSWORD",
              "IOS_APP_STORE_CONNECT_KEY_ID",
              "IOS_APP_STORE_CONNECT_ISSUER_ID",
              "IOS_APP_STORE_CONNECT_KEY_BASE64",
          ]
          missing = [name for name in required if not os.environ.get(name)]
          if missing:
              raise SystemExit(f"Missing required macOS signing secrets: {', '.join(missing)}")

          temp_dir = Path(tempfile.mkdtemp(prefix="aura-macos-signing-"))
          p12_path = temp_dir / "developer-id.p12"
          p8_path = temp_dir / f"AuthKey_{os.environ['IOS_APP_STORE_CONNECT_KEY_ID']}.p8"

          p12_path.write_bytes(base64.b64decode(os.environ["MACOS_DEVELOPER_ID_P12_BASE64"]))
          p8_path.write_bytes(base64.b64decode(os.environ["IOS_APP_STORE_CONNECT_KEY_BASE64"]))

          pem = subprocess.run(
              [
                  "openssl",
                  "pkcs12",
                  "-in",
                  str(p12_path),
                  "-clcerts",
                  "-nokeys",
                  "-passin",
                  f"pass:{os.environ['MACOS_DEVELOPER_ID_P12_PASSWORD']}",
              ],
              check=True,
              capture_output=True,
              text=True,
          ).stdout

          subject = subprocess.run(
              ["openssl", "x509", "-noout", "-subject", "-nameopt", "RFC2253"],
              input=pem,
              check=True,
              capture_output=True,
              text=True,
          ).stdout.strip()

          match = re.search(r"CN=((?:\\.|[^,])+)", subject)
          if not match:
              raise SystemExit(f"Unable to derive signing identity from certificate subject: {subject}")
          signing_identity = re.sub(r"\\(.)", r"\1", match.group(1))

          env_path = Path(os.environ["GITHUB_ENV"])
          with env_path.open("a", encoding="utf-8") as fh:
              fh.write(f"APPLE_CERTIFICATE={os.environ['MACOS_DEVELOPER_ID_P12_BASE64']}\n")
              fh.write(f"APPLE_CERTIFICATE_PASSWORD={os.environ['MACOS_DEVELOPER_ID_P12_PASSWORD']}\n")
              fh.write(f"APPLE_API_KEY={os.environ['IOS_APP_STORE_CONNECT_KEY_ID']}\n")
              fh.write(f"APPLE_API_ISSUER={os.environ['IOS_APP_STORE_CONNECT_ISSUER_ID']}\n")
              fh.write(f"APPLE_API_KEY_PATH={p8_path}\n")
              fh.write(f"MACOS_SIGNING_IDENTITY={signing_identity}\n")
          PY

      - name: Inject macOS signing identity into packager config
        if: matrix.target == 'macos'
        shell: bash
        run: |
          python3 <<'PY'
          import os
          import re
          from pathlib import Path

          cargo_toml = Path("apps/aura-os-desktop/Cargo.toml")
          text = cargo_toml.read_text(encoding="utf-8")
          escaped_identity = (
              os.environ["MACOS_SIGNING_IDENTITY"]
              .replace("\\", "\\\\")
              .replace('"', '\\"')
          )
          identity_line = f'signing-identity = "{escaped_identity}"'

          if "signing-identity =" in text:
              text = re.sub(r'^signing-identity = ".*"$', identity_line, text, flags=re.MULTILINE)
          else:
              marker = "[package.metadata.packager.macos]\n"
              if marker not in text:
                  raise SystemExit("Missing [package.metadata.packager.macos] section in Cargo.toml")
              text = text.replace(marker, marker + identity_line + "\n", 1)

          cargo_toml.write_text(text, encoding="utf-8")
          PY

      - name: Validate macOS packager manifest
        if: matrix.target == 'macos'
        run: cargo metadata --no-deps --manifest-path apps/aura-os-desktop/Cargo.toml > /dev/null

      - name: Skip duplicate packager prebuild in CI
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          cargo_toml = Path("apps/aura-os-desktop/Cargo.toml")
          lines = cargo_toml.read_text(encoding="utf-8").splitlines()
          filtered = [line for line in lines if not line.strip().startswith("before-packaging-command = ")]
          cargo_toml.write_text("\n".join(filtered) + "\n", encoding="utf-8")
          PY

      - name: Package installer
        env:
          AURA_DESKTOP_USE_PREBUILT_FRONTEND: "1"
          AURA_UPDATE_BASE_URL: ${{ env.AURA_UPDATE_BASE_URL }}
        shell: bash
        run: |
          set -o pipefail

          package_once() {
            # cargo-packager 0.11.8 does not accept cargo build flags
            # (--no-default-features / --features) directly. The stable-channel
            # binary is produced by the `build-app` job (which passes those
            # flags to cargo build), uploaded as `desktop-build-inputs.tar`,
            # and consumed here via the `binaries-dir = "../../prebuilt-binaries"`
            # entry that the previous step injects into Cargo.toml. The
            # `before-packaging-command` line is stripped above so cargo-packager
            # does not redundantly rebuild on top of the prebuilt binary.
            cargo packager --release --packages aura-os-desktop 2>&1 | tee packager.log
          }

          should_retry_packaging() {
            # macOS: retry on transient DMG creation flakes, and on transient
            # HTTP failures from Apple's notary service (notarytool surfaces
            # 5xx / 429 as `HTTP status code: NNN`).
            if [ "${{ matrix.target }}" = "macos" ] \
              && grep -Eiq "hdiutil: .*Resource busy|resource is being held|resource temporarily unavailable|HTTP status code: (429|5[0-9][0-9])" packager.log; then
              return 0
            fi

            if [ "${{ matrix.target }}" = "linux" ] \
              && grep -Eq "ERROR .*: status code (429|5[0-9][0-9])" packager.log; then
              return 0
            fi

            return 1
          }

          cleanup_retryable_packaging_failure() {
            if [ "${{ matrix.target }}" = "macos" ]; then
              python3 infra/scripts/release/cleanup-stale-macos-dmg.py
              bash infra/scripts/release/install-patched-create-dmg.sh
            fi

            rm -f packager.log
            sleep 5
          }

          max_attempts=3
          attempt=1

          while ! package_once; do
            if [ "$attempt" -ge "$max_attempts" ] || ! should_retry_packaging; then
              exit 1
            fi

            attempt=$((attempt + 1))
            echo "Retrying packaging after transient platform packaging failure (attempt ${attempt}/${max_attempts})..."
            cleanup_retryable_packaging_failure
          done

      - name: Collect artifacts
        id: artifacts
        shell: bash
        run: |
          mkdir -p dist
          cp "$AURA_RELEASE_DIR"/*.{exe,dmg,AppImage,deb} dist/ 2>/dev/null || true
          cp "$AURA_RELEASE_DIR"/*.app.tar.gz dist/ 2>/dev/null || true
          cp -R "$AURA_RELEASE_DIR"/*.app dist/ 2>/dev/null || true
          cp "$AURA_RELEASE_DIR"/*-setup*.exe dist/ 2>/dev/null || true
          cp "$AURA_RELEASE_DIR"/*.sig dist/ 2>/dev/null || true
          cp "$AURA_RELEASE_DIR"/bundle/*/*.{exe,dmg,AppImage,deb} dist/ 2>/dev/null || true
          cp "$AURA_RELEASE_DIR"/bundle/*/*.app.tar.gz dist/ 2>/dev/null || true
          cp -R "$AURA_RELEASE_DIR"/bundle/*/*.app dist/ 2>/dev/null || true
          cp "$AURA_RELEASE_DIR"/bundle/*/*-setup*.exe dist/ 2>/dev/null || true
          cp "$AURA_RELEASE_DIR"/bundle/*/*.sig dist/ 2>/dev/null || true
          if [ "${{ matrix.target }}" = "macos" ]; then
            for bundle in dist/*.app.tar.gz; do
              [ -e "$bundle" ] || continue
              renamed="dist/aura-os-desktop_${{ steps.version.outputs.version }}_${{ matrix.arch }}.app.tar.gz"
              mv "$bundle" "$renamed"
              if [ -f "${bundle}.sig" ]; then
                mv "${bundle}.sig" "${renamed}.sig"
              fi
            done
            if ! ls dist/*.app.tar.gz >/dev/null 2>&1; then
              for app_bundle in dist/*.app; do
                [ -e "$app_bundle" ] || continue
                archive_path="dist/aura-os-desktop_${{ steps.version.outputs.version }}_${{ matrix.arch }}.app.tar.gz"
                COPYFILE_DISABLE=1 tar -czf "$archive_path" -C dist "$(basename "$app_bundle")"
                break
              done
            fi
          fi
          ls -la dist/
          echo "dir=dist" >> "$GITHUB_OUTPUT"

      - name: Normalize signing key
        shell: bash
        env:
          CARGO_PACKAGER_SIGN_PRIVATE_KEY: ${{ secrets.CARGO_PACKAGER_SIGN_PRIVATE_KEY }}
        run: |
          normalized="$(python3 infra/scripts/release/normalize-packager-key.py)"
          if [ -n "$normalized" ]; then
            echo "CARGO_PACKAGER_SIGN_PRIVATE_KEY=$normalized" >> "$GITHUB_ENV"
          fi

      - name: Sign packaged updater artifacts
        env:
          CARGO_PACKAGER_SIGN_PRIVATE_KEY: ${{ env.CARGO_PACKAGER_SIGN_PRIVATE_KEY }}
          CARGO_PACKAGER_SIGN_PRIVATE_KEY_PASSWORD: ${{ secrets.CARGO_PACKAGER_SIGN_PRIVATE_KEY_PASSWORD }}
        run: node infra/scripts/release/desktop-sign-artifacts.mjs --dir dist --prune-app-bundles

      - name: Generate artifact summary and checksums
        shell: bash
        run: |
          node infra/scripts/release/desktop-release-summary.mjs dist stable "${{ steps.version.outputs.version }}"
          mv dist/release-summary.json "dist/release-summary-${{ matrix.target }}-${{ matrix.arch }}.json"
          mv dist/release-summary.md "dist/release-summary-${{ matrix.target }}-${{ matrix.arch }}.md"
          mv dist/checksums.txt "dist/checksums-${{ matrix.target }}-${{ matrix.arch }}.txt"
          cat "dist/release-summary-${{ matrix.target }}-${{ matrix.arch }}.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: installers-${{ matrix.target }}-${{ matrix.arch }}
          path: dist/

  release:
    needs: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "tag=v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: installers-*
          path: all-artifacts
          merge-multiple: true

      - name: Write release metadata
        shell: bash
        run: |
          mkdir -p release-metadata
          jq -n \
            --arg channel stable \
            --arg workflow "Desktop Stable Release" \
            --arg version "${{ steps.version.outputs.version }}" \
            --arg tag "${{ steps.version.outputs.tag }}" \
            --arg release_url "https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag }}" \
            '{
              channel: $channel,
              workflow: $workflow,
              version: $version,
              tag: $tag,
              release_url: $release_url
            }' > release-metadata/release-metadata.json

      - name: Upload release metadata
        uses: actions/upload-artifact@v5
        with:
          name: release-metadata
          path: release-metadata/release-metadata.json

      - name: Create GitHub Release
        id: release_stable
        uses: softprops/action-gh-release@v2
        continue-on-error: true
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: AURA ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: all-artifacts/**/*

      - name: Reconcile stable release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          bash infra/scripts/release/upload-release-assets-with-retry.sh \
            "${{ github.repository }}" \
            "${{ steps.version.outputs.tag }}" \
            all-artifacts

      - name: Attach release summary to job
        shell: bash
        run: |
          shopt -s nullglob
          for file in all-artifacts/release-summary-*.md; do
            cat "$file" >> "$GITHUB_STEP_SUMMARY"
          done

  publish-manifests:
    needs: [package, release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          path: repo

      - uses: actions/checkout@v5
        with:
          ref: gh-pages
          fetch-depth: 0
          path: pages

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 25.9.0

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "tag=v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: installers-*
          path: all-artifacts
          merge-multiple: true

      - name: Generate update manifests
        shell: bash
        run: |
          cd repo
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}"

          generate_manifest() {
            local target=$1 arch=$2 filename=$3 format=$4
            local sig_file="../all-artifacts/${filename}.sig"
            local signature='""'
            if [ -f "$sig_file" ]; then
              signature=$(jq -Rs . < "$sig_file")
            fi

            mkdir -p "../pages/stable/${target}"
            cat > "../pages/stable/${target}/${arch}.json" <<MANIFEST
          {
            "version": "${VERSION}",
            "url": "${BASE_URL}/${filename}",
            "signature": ${signature},
            "format": "${format}"
          }
          MANIFEST
          }

          generate_manifest "windows" "x86_64" "aura-os-desktop_${VERSION}_x64-setup.exe" "nsis"
          generate_manifest "macos" "aarch64" "aura-os-desktop_${VERSION}_aarch64.app.tar.gz" "app"
          generate_manifest "macos" "x86_64" "aura-os-desktop_${VERSION}_x86_64.app.tar.gz" "app"
          generate_manifest "linux" "x86_64" "aura-os-desktop_${VERSION}_x86_64.AppImage" "appimage"

          mkdir -p "../pages/downloads"
          cat > "../pages/downloads/stable.json" <<MANIFEST
          {
            "channel": "stable",
            "version": "${VERSION}",
            "release_url": "https://github.com/${{ github.repository }}/releases/tag/${TAG}",
            "generated_at": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "desktop": {
              "windows": {
                "url": "https://github.com/${{ github.repository }}/releases/download/${TAG}/aura-os-desktop_${VERSION}_x64-setup.exe"
              },
              "mac": {
                "apple-silicon": {
                  "url": "https://github.com/${{ github.repository }}/releases/download/${TAG}/AURA_${VERSION}_aarch64.dmg"
                },
                "intel": {
                  "url": "https://github.com/${{ github.repository }}/releases/download/${TAG}/AURA_${VERSION}_x64.dmg"
                }
              },
              "linux": {
                "url": "https://github.com/${{ github.repository }}/releases/download/${TAG}/aura-os-desktop_${VERSION}_x86_64.AppImage"
              }
            }
          }
          MANIFEST

      - name: Validate stable update manifests
        run: |
          cd repo
          node infra/scripts/release/desktop-manifest-validate.mjs \
            --root-dir ../pages \
            --channel stable \
            --output-dir ../manifest-validation

      - name: Validate stable download manifest
        run: |
          cd repo
          node infra/scripts/release/desktop-downloads-validate.mjs \
            --manifest ../pages/downloads/stable.json \
            --artifacts-dir ../all-artifacts \
            --channel stable \
            --output-dir ../manifest-validation

      - name: Attach stable manifest summary
        shell: bash
        run: |
          cat manifest-validation/desktop-manifests-stable.md >> "$GITHUB_STEP_SUMMARY"
          cat manifest-validation/desktop-downloads-stable.md >> "$GITHUB_STEP_SUMMARY"

      - name: Commit and push manifests
        run: |
          cd pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stable/ downloads/stable.json
          git diff --cached --quiet || git commit -m "Update stable manifests for ${{ steps.version.outputs.version }}"
          git push
