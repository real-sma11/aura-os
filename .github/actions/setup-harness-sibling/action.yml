name: Setup harness sibling workspace
description: Checks out the remaining sibling repositories Aura CI still needs now that ZUI is vendored inside this repository.

inputs:
  repository-owner:
    description: GitHub org or user that owns the aura-harness repo.
    required: true
  include-harness:
    description: Also check out the public aura-harness repo for Rust path dependencies.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Checkout aura-harness
      if: inputs.include-harness == 'true'
      uses: actions/checkout@v4
      with:
        repository: ${{ inputs.repository-owner }}/aura-harness
        # Check out directly as a true sibling (../aura-harness relative to
        # GITHUB_WORKSPACE). This avoids the symlink workaround that previously
        # caused cargo to canonicalize the path and resolve relative path
        # dependencies (../aura-os/crates/...) from the wrong location.
        path: ../aura-harness
