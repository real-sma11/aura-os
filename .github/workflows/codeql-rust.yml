name: CodeQL Rust

on:
  pull_request:
    paths:
      - Cargo.lock
      - Cargo.toml
      - rust-toolchain.toml
      - apps/aura-os-desktop/**
      - apps/aura-os-ide/**
      - apps/aura-os-server/**
      - crates/**
  push:
    branches: [main]
    paths:
      - Cargo.lock
      - Cargo.toml
      - rust-toolchain.toml
      - apps/aura-os-desktop/**
      - apps/aura-os-ide/**
      - apps/aura-os-server/**
      - crates/**
  schedule:
    - cron: "17 9 * * 1-5"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-rust-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-rust:
    name: Analyze Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: rust
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:rust"
