name: Android Validation + Play/GitHub Release

on:
  push:
    branches:
      - main
      - codex/mobile-android-shell-clean
      - codex/mobile-store-integration
  pull_request:
    paths:
      - .github/actions/**
      - .github/workflows/android-mobile.yml
      - interface/**
      - README.md
  workflow_dispatch:
    inputs:
      lane:
        description: "fastlane lane to run"
        required: true
        default: beta
        type: choice
        options:
          - preflight
          - beta
          - release
          - github_release
      track:
        description: "Google Play track"
        required: true
        default: internal
        type: choice
        options:
          - internal
          - closed
          - production
      release_status:
        description: "Only applies to the release lane"
        required: true
        default: draft
        type: choice
        options:
          - draft
          - completed

permissions:
  contents: read

concurrency:
  group: android-mobile-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-android-shell:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install Node.js
        uses: ./.github/actions/setup-node
        with:
          cache: npm
          cache-dependency-path: interface/package-lock.json

      - name: Install Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Install Android SDK tools
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Run Android validation entrypoint
        run: node scripts/ci/verify-android.mjs

      - name: Attach Android validation summary
        shell: bash
        run: cat mobile-release-summary/android-validate-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Android validation artifacts
        uses: actions/upload-artifact@v5
        with:
          name: android-validate-artifacts
          if-no-files-found: ignore
          path: |
            mobile-release-summary/**
            interface/android/app/build/outputs/apk/debug/*.apk

  ship-android:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_PACKAGE_NAME: ${{ secrets.ANDROID_PACKAGE_NAME }}
      ANDROID_PLAY_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.ANDROID_PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}
      ANDROID_VERSION_CODE: ${{ github.run_number }}
      VITE_ANDROID_DEFAULT_HOST: ${{ vars.VITE_ANDROID_DEFAULT_HOST }}
      VITE_NATIVE_DEFAULT_HOST: ${{ vars.VITE_NATIVE_DEFAULT_HOST }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Node.js
        uses: ./.github/actions/setup-node
        with:
          cache: npm
          cache-dependency-path: interface/package-lock.json

      - name: Install Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Install Android SDK tools
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Install Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.2"

      - name: Check Android runtime parity
        run: node scripts/ci/check-runtime.mjs android --native --ruby

      - name: Install interface dependencies
        working-directory: interface
        run: npm ci

      - name: Install fastlane gems
        working-directory: interface/android
        run: bundle install --jobs 4 --retry 3

      - name: Resolve Android host defaults
        shell: bash
        run: |
          DEFAULT_HOST="${VITE_NATIVE_DEFAULT_HOST:-https://aura-os-t565.onrender.com}"
          echo "VITE_NATIVE_DEFAULT_HOST=${DEFAULT_HOST}" >> "$GITHUB_ENV"
          echo "VITE_ANDROID_DEFAULT_HOST=${VITE_ANDROID_DEFAULT_HOST:-$DEFAULT_HOST}" >> "$GITHUB_ENV"

      - name: Materialize Android upload keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > /tmp/aura-android-upload.jks
          echo "ANDROID_KEYSTORE_PATH=/tmp/aura-android-upload.jks" >> "$GITHUB_ENV"

      - name: Resolve Android release plan
        id: plan
        shell: bash
        run: |
          lane="${{ inputs.lane }}"
          channel="beta"
          case "$lane" in
            release) channel="stable" ;;
            beta) channel="beta" ;;
            preflight) channel="preflight" ;;
            github_release) channel="github" ;;
          esac

          # Keep the old automatic main-push plan here for easy restoration if
          # we ever want this workflow to publish outside manual dispatch again.
          #
          # lane="github_release"
          # track="internal"
          # release_status="draft"
          # channel="github"
          #
          # Or, for automatic Play publishing:
          # lane="release"
          # track="production"
          # release_status="completed"
          # channel="stable"

          echo "lane=$lane" >> "$GITHUB_OUTPUT"
          echo "track=${{ inputs.track }}" >> "$GITHUB_OUTPUT"
          echo "release_status=${{ inputs.release_status }}" >> "$GITHUB_OUTPUT"
          echo "channel=$channel" >> "$GITHUB_OUTPUT"

      - name: Compute app version
        id: version
        shell: bash
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          CHANNEL="${{ steps.plan.outputs.channel }}"
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "main" ]; then
            VERSION="${CHANNEL}.${SHORT_SHA}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "channel=${CHANNEL}" >> "$GITHUB_OUTPUT"

      - name: Verify Android release secrets
        run: node scripts/ci/verify-android-release-secrets.mjs ${{ steps.plan.outputs.lane }}

      - name: Upload bundle with fastlane
        working-directory: interface/android
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
          APP_COMMIT: ${{ github.sha }}
          APP_CHANNEL: ${{ steps.version.outputs.channel }}
          ANDROID_PLAY_TRACK: ${{ steps.plan.outputs.track }}
          ANDROID_PLAY_RELEASE_STATUS: ${{ steps.plan.outputs.release_status }}
        run: bundle exec fastlane android ${{ steps.plan.outputs.lane }}

      - name: Summarize Android release outputs
        run: |
          node infra/scripts/release/mobile-release-summary.mjs \
            --platform android \
            --mode ship \
            --output-dir mobile-release-summary \
            --roots interface/android/app/build/outputs

      - name: Attach Android release summary
        shell: bash
        run: cat mobile-release-summary/android-ship-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Android release artifacts
        uses: actions/upload-artifact@v5
        with:
          name: android-release-artifacts
          if-no-files-found: ignore
          path: |
            mobile-release-summary/**
            interface/android/app/build/outputs/**/*.apk
            interface/android/app/build/outputs/**/*.aab
