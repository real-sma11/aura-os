name: Setup harness sibling workspace
description: Checks out the remaining sibling repositories Aura CI still needs now that ZUI is vendored inside this repository.

inputs:
  repository-owner:
    description: GitHub org or user that owns the aura-harness repo.
    required: true
  include-harness:
    description: Also check out the public aura-harness repo for Rust path dependencies.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Checkout aura-harness
      if: inputs.include-harness == 'true'
      shell: bash
      run: |
        # actions/checkout@v4 enforces that path: must be within GITHUB_WORKSPACE,
        # but aura-harness must live as a true sibling (../aura-harness) so that
        # cargo's canonicalize() resolves path dependencies correctly. A raw git
        # clone has no workspace boundary restriction.
        git clone --depth 1 \
          "https://github.com/${{ inputs.repository-owner }}/aura-harness.git" \
          "../aura-harness"
