name: Desktop Nightly Release

on:
  push:
    branches:
      - main
      - codex/release-build-system
  workflow_dispatch:
    inputs:
      publish_live:
        description: "Publish the GitHub nightly release and gh-pages manifests"
        required: true
        default: false
        type: boolean

permissions:
  actions: read
  contents: write

concurrency:
  group: nightly-release-${{ github.ref_name }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  AURA_UPDATE_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v5

      - name: Resolve nightly version
        id: version
        shell: bash
        run: |
          BASE=$(grep '^version' apps/aura-os-desktop/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          RUN_SEQ="${{ github.run_number }}"
          VERSION="${BASE}-nightly.${RUN_SEQ}.1"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

  release-preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: ./.github/actions/setup-rust-toolchain

      - name: Install Node.js
        uses: ./.github/actions/setup-node

      - name: Run release preflight
        run: node scripts/ci/verify-release-preflight.mjs

  build-interface:
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Node.js
        uses: ./.github/actions/setup-node
        with:
          cache: npm
          cache-dependency-path: interface/package-lock.json

      - name: Build interface
        working-directory: interface
        env:
          APP_VERSION: ${{ needs.resolve-version.outputs.version }}
          APP_COMMIT: ${{ github.sha }}
          APP_CHANNEL: nightly
        run: |
          npm ci
          npm run build
          node ../infra/scripts/release/desktop-frontend-assets-validate.mjs --dist dist

      - name: Upload interface dist
        uses: actions/upload-artifact@v5
        with:
          name: interface-dist-nightly
          path: interface/dist
          compression-level: 0

  build-sidecar:
    env:
      CARGO_TARGET_DIR: ../.aura-shared-target
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            arch: x86_64
          - os: macos-latest
            target: macos
            arch: aarch64
          - os: macos-15-intel
            target: macos
            arch: x86_64
          - os: windows-latest
            target: windows
            arch: x86_64

    runs-on: ${{ matrix.os == 'windows-latest' && 'aura-os-windows-x64-large' || matrix.os == 'ubuntu-latest' && 'aura-os-linux-x64-large' || matrix.os == 'macos-15-intel' && 'macos-15-large' || matrix.os == 'macos-latest' && 'macos-15-xlarge' || matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Prepare harness sibling workspace
        uses: ./.github/actions/setup-harness-sibling
        with:
          repository-owner: ${{ github.repository_owner }}
          include-harness: "true"

      - name: Restore bundled sidecar binary cache
        id: sidecar-binary-cache
        uses: actions/cache@v4
        with:
          path: apps/aura-os-desktop/resources/sidecar
          key: desktop-sidecar-bin-v1-${{ matrix.target }}-${{ matrix.arch }}-${{ hashFiles('aura-harness/Cargo.lock', 'aura-harness/Cargo.toml', 'aura-harness/crates/**/Cargo.toml', 'aura-harness/crates/**/*.rs') }}

      - name: Validate cached sidecar binary
        if: steps.sidecar-binary-cache.outputs.cache-hit == 'true'
        shell: bash
        run: |
          binary="apps/aura-os-desktop/resources/sidecar/aura-node"
          if [ "${{ matrix.target }}" = "windows" ]; then
            binary="${binary}.exe"
          fi
          test -s "$binary"

      - name: Install Rust toolchain
        if: steps.sidecar-binary-cache.outputs.cache-hit != 'true'
        uses: ./.github/actions/setup-rust-toolchain

      - name: Restore sidecar Rust cache
        if: steps.sidecar-binary-cache.outputs.cache-hit != 'true'
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: desktop-sidecar-v4-${{ runner.os }}-${{ runner.arch }}
          workspaces: |
            ../aura-harness -> ../.aura-shared-target
          cache-on-failure: true

      - name: Set up sccache
        if: steps.sidecar-binary-cache.outputs.cache-hit != 'true'
        id: sccache-sidecar
        uses: mozilla-actions/sccache-action@v0.0.9
        continue-on-error: true

      - name: Configure sccache backend
        if: steps.sidecar-binary-cache.outputs.cache-hit != 'true' && steps.sccache-sidecar.outcome == 'success'
        shell: bash
        env:
          DEPOT_CACHE_TOKEN: ${{ secrets.DEPOT_CACHE_TOKEN }}
        run: |
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          if [ -n "$DEPOT_CACHE_TOKEN" ]; then
            echo "SCCACHE_WEBDAV_ENDPOINT=https://cache.depot.dev" >> "$GITHUB_ENV"
            echo "SCCACHE_WEBDAV_TOKEN=$DEPOT_CACHE_TOKEN" >> "$GITHUB_ENV"
          else
            echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          fi

      - name: Install Linux runner dependencies
        if: steps.sidecar-binary-cache.outputs.cache-hit != 'true' && matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang pkg-config libatomic1 libssl-dev libdbus-1-dev libpipewire-0.3-dev

      - name: Install Node.js
        if: steps.sidecar-binary-cache.outputs.cache-hit != 'true'
        uses: ./.github/actions/setup-node

      - name: Verify runner architecture
        if: steps.sidecar-binary-cache.outputs.cache-hit != 'true' && matrix.target == 'linux'
        shell: bash
        run: |
          actual_arch="$(uname -m)"
          expected_arch="${{ matrix.arch }}"
          if [ "$actual_arch" != "$expected_arch" ]; then
            echo "Expected Linux runner architecture $expected_arch but got $actual_arch" >&2
            exit 1
          fi

      - name: Check desktop runtime parity
        if: steps.sidecar-binary-cache.outputs.cache-hit != 'true'
        run: node scripts/ci/check-runtime.mjs desktop --require-harness

      - name: Validate desktop auto-update sidecar contract
        if: steps.sidecar-binary-cache.outputs.cache-hit != 'true'
        run: |
          node --test infra/scripts/release/prepare-desktop-sidecar.test.mjs
          node infra/scripts/release/prepare-desktop-sidecar.mjs --check

      - name: Build bundled aura-node sidecar
        if: steps.sidecar-binary-cache.outputs.cache-hit != 'true'
        run: node infra/scripts/release/prepare-desktop-sidecar.mjs

      - name: Archive bundled sidecar
        shell: bash
        run: |
          tar -cf desktop-sidecar.tar -C apps/aura-os-desktop/resources sidecar

      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v5
        with:
          name: sidecar-${{ matrix.target }}-${{ matrix.arch }}
          path: desktop-sidecar.tar
          compression-level: 0

  package:
    needs: [resolve-version, release-preflight]
    env:
      CARGO_TARGET_DIR: ../.aura-shared-target
      AURA_RELEASE_DIR: ../.aura-shared-target/release
      AURA_RELEASE_BINARY_CACHE_DIR: .ci-cache/desktop-release-bin
      MACOS_DEVELOPER_ID_P12_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_P12_BASE64 }}
      MACOS_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_P12_PASSWORD }}
      MACOS_DEVELOPER_TEAM_ID: ${{ secrets.MACOS_DEVELOPER_TEAM_ID }}
      IOS_APP_STORE_CONNECT_KEY_ID: ${{ secrets.IOS_APP_STORE_CONNECT_KEY_ID }}
      IOS_APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.IOS_APP_STORE_CONNECT_ISSUER_ID }}
      IOS_APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.IOS_APP_STORE_CONNECT_KEY_BASE64 }}
      AURA_NETWORK_URL: ${{ vars.AURA_NETWORK_URL }}
      AURA_STORAGE_URL: ${{ vars.AURA_STORAGE_URL }}
      AURA_INTEGRATIONS_URL: ${{ vars.AURA_INTEGRATIONS_URL }}
      AURA_ROUTER_URL: ${{ vars.AURA_ROUTER_URL }}
      Z_BILLING_URL: ${{ vars.Z_BILLING_URL }}
      ORBIT_BASE_URL: ${{ vars.ORBIT_BASE_URL }}
      SWARM_BASE_URL: ${{ vars.SWARM_BASE_URL }}
      REQUIRE_ZERO_PRO: ${{ vars.REQUIRE_ZERO_PRO }}
      AURA_DISABLE_LOCAL_HARNESS_AUTOSPAWN: ${{ vars.AURA_DISABLE_LOCAL_HARNESS_AUTOSPAWN }}
      VITE_MIXPANEL_TOKEN: ${{ vars.VITE_MIXPANEL_TOKEN }}
      Z_BILLING_API_KEY: ${{ secrets.Z_BILLING_API_KEY }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            arch: x86_64
          - os: macos-latest
            target: macos
            arch: aarch64
          - os: macos-15-intel
            target: macos
            arch: x86_64
          - os: windows-latest
            target: windows
            arch: x86_64

    runs-on: ${{ matrix.os == 'windows-latest' && 'aura-os-windows-x64-large' || matrix.os == 'ubuntu-latest' && 'aura-os-linux-x64-large' || matrix.os == 'macos-15-intel' && 'macos-15-large' || matrix.os == 'macos-latest' && 'macos-15-xlarge' || matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Compute desktop binary cache inputs
        id: desktop-binary-cache-inputs
        shell: bash
        env:
          CACHE_UPDATER_PUBLIC_KEY: ${{ secrets.CARGO_PACKAGER_SIGN_PUBLIC_KEY }}
          CACHE_AURA_UPDATE_BASE_URL: ${{ env.AURA_UPDATE_BASE_URL }}
          CACHE_AURA_NETWORK_URL: ${{ vars.AURA_NETWORK_URL }}
          CACHE_AURA_STORAGE_URL: ${{ vars.AURA_STORAGE_URL }}
          CACHE_AURA_INTEGRATIONS_URL: ${{ vars.AURA_INTEGRATIONS_URL }}
          CACHE_AURA_ROUTER_URL: ${{ vars.AURA_ROUTER_URL }}
          CACHE_Z_BILLING_URL: ${{ vars.Z_BILLING_URL }}
          CACHE_ORBIT_BASE_URL: ${{ vars.ORBIT_BASE_URL }}
          CACHE_SWARM_BASE_URL: ${{ vars.SWARM_BASE_URL }}
          CACHE_REQUIRE_ZERO_PRO: ${{ vars.REQUIRE_ZERO_PRO }}
          CACHE_AURA_DISABLE_LOCAL_HARNESS_AUTOSPAWN: ${{ vars.AURA_DISABLE_LOCAL_HARNESS_AUTOSPAWN }}
          CACHE_VITE_MIXPANEL_TOKEN: ${{ vars.VITE_MIXPANEL_TOKEN }}
          CACHE_Z_BILLING_API_KEY: ${{ secrets.Z_BILLING_API_KEY }}
        run: |
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const crypto = require("node:crypto");
          const names = [
            "CACHE_UPDATER_PUBLIC_KEY",
            "CACHE_AURA_UPDATE_BASE_URL",
            "CACHE_AURA_NETWORK_URL",
            "CACHE_AURA_STORAGE_URL",
            "CACHE_AURA_INTEGRATIONS_URL",
            "CACHE_AURA_ROUTER_URL",
            "CACHE_Z_BILLING_URL",
            "CACHE_ORBIT_BASE_URL",
            "CACHE_SWARM_BASE_URL",
            "CACHE_REQUIRE_ZERO_PRO",
            "CACHE_AURA_DISABLE_LOCAL_HARNESS_AUTOSPAWN",
            "CACHE_VITE_MIXPANEL_TOKEN",
            "CACHE_Z_BILLING_API_KEY",
          ];
          const hash = crypto.createHash("sha256");
          for (const name of names) {
            hash.update(name);
            hash.update("\0");
            hash.update(process.env[name] || "");
            hash.update("\0");
          }
          console.log(`fingerprint=${hash.digest("hex")}`);
          NODE

      - name: Restore desktop release binary cache
        id: desktop-release-binary-cache
        uses: actions/cache@v4
        with:
          path: .ci-cache/desktop-release-bin
          key: desktop-release-bin-v1-${{ matrix.target }}-${{ matrix.arch }}-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'rust-toolchain.toml', '.github/actions/setup-rust-toolchain/**', 'apps/aura-os-desktop/Cargo.toml', 'apps/aura-os-desktop/build.rs', 'apps/aura-os-desktop/src/**/*.rs', 'apps/aura-os-desktop/assets/**', 'apps/aura-os-server/Cargo.toml', 'apps/aura-os-server/src/**/*.rs', 'apps/aura-os-ide/Cargo.toml', 'apps/aura-os-ide/src/**/*.rs', 'crates/**/Cargo.toml', 'crates/**/*.rs') }}-${{ steps.desktop-binary-cache-inputs.outputs.fingerprint }}

      - name: Install Rust toolchain
        uses: ./.github/actions/setup-rust-toolchain

      - name: Restore desktop Rust cache
        if: steps.desktop-release-binary-cache.outputs.cache-hit != 'true'
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: desktop-app-v3-${{ runner.os }}-${{ runner.arch }}
          workspaces: |
            . -> ../.aura-shared-target
          cache-on-failure: true

      - name: Set up sccache
        if: steps.desktop-release-binary-cache.outputs.cache-hit != 'true'
        id: sccache-package
        uses: mozilla-actions/sccache-action@v0.0.9
        continue-on-error: true

      - name: Configure sccache backend
        if: steps.desktop-release-binary-cache.outputs.cache-hit != 'true' && steps.sccache-package.outcome == 'success'
        shell: bash
        env:
          DEPOT_CACHE_TOKEN: ${{ secrets.DEPOT_CACHE_TOKEN }}
        run: |
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          if [ -n "$DEPOT_CACHE_TOKEN" ]; then
            echo "SCCACHE_WEBDAV_ENDPOINT=https://cache.depot.dev" >> "$GITHUB_ENV"
            echo "SCCACHE_WEBDAV_TOKEN=$DEPOT_CACHE_TOKEN" >> "$GITHUB_ENV"
          else
            echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          fi

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang pkg-config libatomic1 libssl-dev libdbus-1-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev libpipewire-0.3-dev libgbm-dev libxdo-dev

      - name: Install Node.js
        uses: ./.github/actions/setup-node

      - name: Verify runner architecture
        if: matrix.target == 'linux'
        shell: bash
        run: |
          actual_arch="$(uname -m)"
          expected_arch="${{ matrix.arch }}"
          if [ "$actual_arch" != "$expected_arch" ]; then
            echo "Expected Linux runner architecture $expected_arch but got $actual_arch" >&2
            exit 1
          fi

      - name: Check desktop runtime parity
        run: node scripts/ci/check-runtime.mjs desktop

      - name: Write desktop release metadata
        shell: bash
        run: |
          node scripts/ci/write-desktop-release-metadata.mjs \
            --version "${{ needs.resolve-version.outputs.version }}"

      - name: Install cargo-packager
        uses: baptiste0928/cargo-install@v3
        with:
          crate: cargo-packager
          version: 0.11.8

      - name: Disable Spotlight indexing for DMG packaging
        if: matrix.target == 'macos'
        shell: bash
        # Spotlight (mds / mdworker_shared) holds open file handles on freshly
        # mounted DMGs, which makes `hdiutil detach` fail with `Resource busy`
        # at the end of `create-dmg`. Disabling indexing for the runner keeps
        # cargo-packager's DMG step from getting wedged.
        run: |
          sudo mdutil -a -i off || true
          sudo mdutil -i off /Volumes || true

      - name: Clean stale macOS DMG mounts
        if: matrix.target == 'macos'
        shell: bash
        run: python3 infra/scripts/release/cleanup-stale-macos-dmg.py

      - name: Install patched create-dmg script
        if: matrix.target == 'macos'
        shell: bash
        # cargo-packager 0.11.8 only downloads upstream create-dmg v1.1.1 if the
        # cache file does not exist. Pre-seeding the cache with our patched copy
        # (-nobrowse on attach, -force on detach retries) is what fixes the
        # recurring `hdiutil: couldn't eject ... Resource busy` failure on the
        # macOS Intel runner.
        run: bash infra/scripts/release/install-patched-create-dmg.sh

      - name: Prepare macOS signing inputs
        if: matrix.target == 'macos'
        shell: bash
        run: |
          python3 <<'PY'
          import base64
          import os
          import re
          import subprocess
          import tempfile
          from pathlib import Path

          required = [
              "MACOS_DEVELOPER_ID_P12_BASE64",
              "MACOS_DEVELOPER_ID_P12_PASSWORD",
              "IOS_APP_STORE_CONNECT_KEY_ID",
              "IOS_APP_STORE_CONNECT_ISSUER_ID",
              "IOS_APP_STORE_CONNECT_KEY_BASE64",
          ]
          missing = [name for name in required if not os.environ.get(name)]
          if missing:
              raise SystemExit(f"Missing required macOS signing secrets: {', '.join(missing)}")

          temp_dir = Path(tempfile.mkdtemp(prefix="aura-macos-signing-"))
          p12_path = temp_dir / "developer-id.p12"
          p8_path = temp_dir / f"AuthKey_{os.environ['IOS_APP_STORE_CONNECT_KEY_ID']}.p8"

          p12_path.write_bytes(base64.b64decode(os.environ["MACOS_DEVELOPER_ID_P12_BASE64"]))
          p8_path.write_bytes(base64.b64decode(os.environ["IOS_APP_STORE_CONNECT_KEY_BASE64"]))

          pem = subprocess.run(
              [
                  "openssl",
                  "pkcs12",
                  "-in",
                  str(p12_path),
                  "-clcerts",
                  "-nokeys",
                  "-passin",
                  f"pass:{os.environ['MACOS_DEVELOPER_ID_P12_PASSWORD']}",
              ],
              check=True,
              capture_output=True,
              text=True,
          ).stdout

          subject = subprocess.run(
              ["openssl", "x509", "-noout", "-subject", "-nameopt", "RFC2253"],
              input=pem,
              check=True,
              capture_output=True,
              text=True,
          ).stdout.strip()

          match = re.search(r"CN=((?:\\.|[^,])+)", subject)
          if not match:
              raise SystemExit(f"Unable to derive signing identity from certificate subject: {subject}")
          signing_identity = re.sub(r"\\(.)", r"\1", match.group(1))

          env_path = Path(os.environ["GITHUB_ENV"])
          with env_path.open("a", encoding="utf-8") as fh:
              fh.write(f"APPLE_CERTIFICATE={os.environ['MACOS_DEVELOPER_ID_P12_BASE64']}\n")
              fh.write(f"APPLE_CERTIFICATE_PASSWORD={os.environ['MACOS_DEVELOPER_ID_P12_PASSWORD']}\n")
              fh.write(f"APPLE_API_KEY={os.environ['IOS_APP_STORE_CONNECT_KEY_ID']}\n")
              fh.write(f"APPLE_API_ISSUER={os.environ['IOS_APP_STORE_CONNECT_ISSUER_ID']}\n")
              fh.write(f"APPLE_API_KEY_PATH={p8_path}\n")
              fh.write(f"MACOS_SIGNING_IDENTITY={signing_identity}\n")
          PY

      - name: Wait for interface build artifact
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          node scripts/ci/wait-gh-artifacts.mjs \
            --artifact "interface-dist-nightly" \
            --interval-seconds 5 \
            --fail-job "build-interface"

      - name: Download interface dist
        uses: actions/download-artifact@v5
        with:
          name: interface-dist-nightly
          path: interface/dist

      - name: Validate interface resources
        shell: bash
        run: |
          test -d interface/dist
          node infra/scripts/release/desktop-frontend-assets-validate.mjs --dist interface/dist

      - name: Build release binary
        if: steps.desktop-release-binary-cache.outputs.cache-hit != 'true'
        env:
          AURA_DESKTOP_USE_PREBUILT_FRONTEND: "1"
          AURA_UPDATE_BASE_URL: ${{ env.AURA_UPDATE_BASE_URL }}
          UPDATER_PUBLIC_KEY: ${{ secrets.CARGO_PACKAGER_SIGN_PUBLIC_KEY }}
        shell: bash
        run: |
          cargo build --release --no-default-features --features stable-channel --package aura-os-desktop

      - name: Store release binary for cache
        if: steps.desktop-release-binary-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          binary_name="aura-os-desktop"
          if [ "${{ matrix.target }}" = "windows" ]; then
            binary_name="${binary_name}.exe"
          fi
          mkdir -p "$AURA_RELEASE_BINARY_CACHE_DIR"
          cp "$AURA_RELEASE_DIR/$binary_name" "$AURA_RELEASE_BINARY_CACHE_DIR/$binary_name"
          test -s "$AURA_RELEASE_BINARY_CACHE_DIR/$binary_name"

      - name: Restore cached release binary
        if: steps.desktop-release-binary-cache.outputs.cache-hit == 'true'
        shell: bash
        run: |
          binary_name="aura-os-desktop"
          if [ "${{ matrix.target }}" = "windows" ]; then
            binary_name="${binary_name}.exe"
          fi
          cached_binary="$AURA_RELEASE_BINARY_CACHE_DIR/$binary_name"
          binary="$AURA_RELEASE_DIR/$binary_name"
          test -s "$cached_binary"
          mkdir -p "$AURA_RELEASE_DIR"
          cp "$cached_binary" "$binary"
          if [ "${{ matrix.target }}" != "windows" ]; then
            chmod 755 "$binary"
          fi
          test -s "$binary"

      - name: Verify release binary channel
        shell: bash
        run: |
          node scripts/ci/verify-desktop-release-binary.mjs \
            --release-dir "$AURA_RELEASE_DIR" \
            --target "${{ matrix.target }}" \
            --expected-channel Stable \
            --expected-version "${{ needs.resolve-version.outputs.version }}"

      - name: Patch Cargo.toml version
        shell: bash
        run: |
          VERSION="${{ needs.resolve-version.outputs.version }}"
          sed -i.bak "s/^version = \".*\"/version = \"${VERSION}\"/" apps/aura-os-desktop/Cargo.toml
          rm -f apps/aura-os-desktop/Cargo.toml.bak

      - name: Prepare packager config
        shell: bash
        run: |
          node scripts/ci/patch-desktop-packager-config.mjs \
            --binaries-dir "../../../.aura-shared-target/release" \
            --strip-before-packaging

      - name: Inject macOS signing identity into packager config
        if: matrix.target == 'macos'
        shell: bash
        run: |
          node scripts/ci/patch-desktop-packager-config.mjs \
            --macos-signing-identity-env MACOS_SIGNING_IDENTITY

      - name: Validate macOS packager manifest
        if: matrix.target == 'macos'
        run: cargo metadata --no-deps --manifest-path apps/aura-os-desktop/Cargo.toml > /dev/null

      - name: Wait for sidecar artifact
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          node scripts/ci/wait-gh-artifacts.mjs \
            --artifact "sidecar-${{ matrix.target }}-${{ matrix.arch }}" \
            --interval-seconds 5 \
            --fail-job "build-sidecar (${{ matrix.os }}, ${{ matrix.target }}, ${{ matrix.arch }})"

      - name: Download sidecar artifact
        uses: actions/download-artifact@v5
        with:
          name: sidecar-${{ matrix.target }}-${{ matrix.arch }}
          path: downloaded-sidecar

      - name: Restore packaged resources
        shell: bash
        run: |
          rm -rf apps/aura-os-desktop/resources/sidecar
          mkdir -p apps/aura-os-desktop/resources
          tar -xf downloaded-sidecar/desktop-sidecar.tar -C apps/aura-os-desktop/resources
          test -d apps/aura-os-desktop/resources/sidecar
          test -f apps/aura-os-desktop/resources/release.json
          test -d interface/dist
          node infra/scripts/release/desktop-frontend-assets-validate.mjs --dist interface/dist
          if [ "${{ matrix.target }}" != "windows" ]; then
            chmod 755 apps/aura-os-desktop/resources/sidecar/aura-node
          fi

      - name: Package installer
        env:
          AURA_DESKTOP_USE_PREBUILT_FRONTEND: "1"
          AURA_UPDATE_BASE_URL: ${{ env.AURA_UPDATE_BASE_URL }}
        shell: bash
        run: |
          set -o pipefail

          package_once() {
            # cargo-packager 0.11.8 does not accept cargo build flags
            # (--no-default-features / --features) directly. The stable-channel
            # binary is produced earlier in this package job, then consumed via
            # the `binaries-dir = "../../../.aura-shared-target/release"` entry
            # that the prepare-packager step injects into Cargo.toml. The
            # `before-packaging-command` line is stripped above so cargo-packager
            # does not redundantly rebuild on top of the prebuilt binary.
            cargo packager --release --packages aura-os-desktop 2>&1 | tee packager.log
          }

          should_retry_packaging() {
            # macOS: retry on transient DMG creation flakes, and on transient
            # HTTP failures from Apple's notary service (notarytool surfaces
            # 5xx / 429 as `HTTP status code: NNN`).
            if [ "${{ matrix.target }}" = "macos" ] \
              && grep -Eiq "hdiutil: .*Resource busy|resource is being held|resource temporarily unavailable|HTTP status code: (429|5[0-9][0-9])" packager.log; then
              return 0
            fi

            if [ "${{ matrix.target }}" = "linux" ] \
              && grep -Eq "ERROR .*: status code (429|5[0-9][0-9])" packager.log; then
              return 0
            fi

            if [ "${{ matrix.target }}" = "windows" ] \
              && grep -Eq "ERROR .*: status code (429|5[0-9][0-9])" packager.log; then
              return 0
            fi

            return 1
          }

          cleanup_retryable_packaging_failure() {
            if [ "${{ matrix.target }}" = "macos" ]; then
              python3 infra/scripts/release/cleanup-stale-macos-dmg.py
              bash infra/scripts/release/install-patched-create-dmg.sh
            fi

            rm -f packager.log
            sleep 5
          }

          max_attempts=3
          attempt=1

          while ! package_once; do
            if [ "$attempt" -ge "$max_attempts" ] || ! should_retry_packaging; then
              exit 1
            fi

            attempt=$((attempt + 1))
            echo "Retrying packaging after transient platform packaging failure (attempt ${attempt}/${max_attempts})..."
            cleanup_retryable_packaging_failure
          done

      - name: Collect artifacts
        id: artifacts
        shell: bash
        run: |
          mkdir -p dist
          cp "$AURA_RELEASE_DIR"/*.{exe,dmg,AppImage,deb} dist/ 2>/dev/null || true
          cp "$AURA_RELEASE_DIR"/*.app.tar.gz dist/ 2>/dev/null || true
          cp -R "$AURA_RELEASE_DIR"/*.app dist/ 2>/dev/null || true
          cp "$AURA_RELEASE_DIR"/*-setup*.exe dist/ 2>/dev/null || true
          cp "$AURA_RELEASE_DIR"/*.sig dist/ 2>/dev/null || true
          cp "$AURA_RELEASE_DIR"/bundle/*/*.{exe,dmg,AppImage,deb} dist/ 2>/dev/null || true
          cp "$AURA_RELEASE_DIR"/bundle/*/*.app.tar.gz dist/ 2>/dev/null || true
          cp -R "$AURA_RELEASE_DIR"/bundle/*/*.app dist/ 2>/dev/null || true
          cp "$AURA_RELEASE_DIR"/bundle/*/*-setup*.exe dist/ 2>/dev/null || true
          cp "$AURA_RELEASE_DIR"/bundle/*/*.sig dist/ 2>/dev/null || true
          if [ "${{ matrix.target }}" = "windows" ]; then
            rm -f dist/aura-os-desktop.exe dist/aura-os-desktop.exe.sig
          fi
          if [ "${{ matrix.target }}" = "macos" ]; then
            for bundle in dist/*.app.tar.gz; do
              [ -e "$bundle" ] || continue
              renamed="dist/aura-os-desktop_${{ needs.resolve-version.outputs.version }}_${{ matrix.arch }}.app.tar.gz"
              mv "$bundle" "$renamed"
              if [ -f "${bundle}.sig" ]; then
                mv "${bundle}.sig" "${renamed}.sig"
              fi
            done
            if ! ls dist/*.app.tar.gz >/dev/null 2>&1; then
              for app_bundle in dist/*.app; do
                [ -e "$app_bundle" ] || continue
                archive_path="dist/aura-os-desktop_${{ needs.resolve-version.outputs.version }}_${{ matrix.arch }}.app.tar.gz"
                COPYFILE_DISABLE=1 tar -czf "$archive_path" -C dist "$(basename "$app_bundle")"
                break
              done
            fi
          fi
          ls -la dist/
          echo "dir=dist" >> "$GITHUB_OUTPUT"

      - name: Normalize signing key
        shell: bash
        env:
          CARGO_PACKAGER_SIGN_PRIVATE_KEY: ${{ secrets.CARGO_PACKAGER_SIGN_PRIVATE_KEY }}
        run: |
          normalized="$(python3 infra/scripts/release/normalize-packager-key.py)"
          if [ -n "$normalized" ]; then
            echo "CARGO_PACKAGER_SIGN_PRIVATE_KEY=$normalized" >> "$GITHUB_ENV"
          fi

      - name: Sign packaged updater artifacts
        env:
          CARGO_PACKAGER_SIGN_PRIVATE_KEY: ${{ env.CARGO_PACKAGER_SIGN_PRIVATE_KEY }}
          CARGO_PACKAGER_SIGN_PRIVATE_KEY_PASSWORD: ${{ secrets.CARGO_PACKAGER_SIGN_PRIVATE_KEY_PASSWORD }}
        run: node infra/scripts/release/desktop-sign-artifacts.mjs --dir dist --prune-app-bundles

      - name: Generate artifact summary and checksums
        shell: bash
        run: |
          node infra/scripts/release/desktop-release-summary.mjs dist nightly "${{ needs.resolve-version.outputs.version }}"
          mv dist/release-summary.json "dist/release-summary-${{ matrix.target }}-${{ matrix.arch }}.json"
          mv dist/release-summary.md "dist/release-summary-${{ matrix.target }}-${{ matrix.arch }}.md"
          mv dist/checksums.txt "dist/checksums-${{ matrix.target }}-${{ matrix.arch }}.txt"
          cat "dist/release-summary-${{ matrix.target }}-${{ matrix.arch }}.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Validate signed release artifacts
        shell: bash
        run: |
          node infra/scripts/release/desktop-release-artifacts-validate.mjs \
            --dist dist \
            --channel nightly \
            --version "${{ needs.resolve-version.outputs.version }}" \
            --target "${{ matrix.target }}" \
            --arch "${{ matrix.arch }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: installers-${{ matrix.target }}-${{ matrix.arch }}
          path: dist/

  release:
    needs: [resolve-version, package]
    if: github.ref_name == 'main' || (github.event_name == 'workflow_dispatch' && inputs.publish_live)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: installers-*
          path: all-artifacts
          merge-multiple: true

      - name: Validate artifact versions
        run: |
          node infra/scripts/release/validate-release-artifact-versions.mjs \
            --artifacts-dir all-artifacts \
            --channel nightly \
            --version "${{ needs.resolve-version.outputs.version }}" \
            --output-dir release-validation

      - name: Write release metadata
        shell: bash
        run: |
          mkdir -p release-metadata
          jq -n \
            --arg channel nightly \
            --arg workflow "Desktop Nightly Release" \
            --arg version "${{ needs.resolve-version.outputs.version }}" \
            --arg tag "${{ needs.resolve-version.outputs.tag }}" \
            --arg release_url "https://github.com/${{ github.repository }}/releases/tag/${{ needs.resolve-version.outputs.tag }}" \
            '{
              channel: $channel,
              workflow: $workflow,
              version: $version,
              tag: $tag,
              release_url: $release_url
            }' > release-metadata/release-metadata.json

      - name: Upload release metadata
        uses: actions/upload-artifact@v5
        with:
          name: release-metadata
          path: release-metadata/release-metadata.json

      - name: Create immutable nightly release
        id: release_immutable
        uses: softprops/action-gh-release@v2
        continue-on-error: true
        with:
          tag_name: ${{ needs.resolve-version.outputs.tag }}
          name: AURA ${{ needs.resolve-version.outputs.version }}
          draft: false
          prerelease: true
          make_latest: false
          overwrite_files: true
          files: all-artifacts/**/*
          body: |
            Automated nightly build from `main` at ${{ github.sha }}.

            **Version**: `${{ needs.resolve-version.outputs.version }}`

      - name: Reconcile immutable nightly release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          bash infra/scripts/release/upload-release-assets-with-retry.sh \
            "${{ github.repository }}" \
            "${{ needs.resolve-version.outputs.tag }}" \
            all-artifacts

      - name: Prune existing nightly release alias assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          bash infra/scripts/release/prune-release-assets-with-retry.sh \
            "${{ github.repository }}" \
            nightly

      - name: Create or update nightly release
        id: release_nightly_alias
        uses: softprops/action-gh-release@v2
        continue-on-error: true
        with:
          tag_name: nightly
          name: "Nightly (${{ needs.resolve-version.outputs.version }})"
          draft: false
          prerelease: true
          make_latest: false
          overwrite_files: true
          files: all-artifacts/**/*
          body: |
            Automated nightly build from `main` at ${{ github.sha }}.

            **Version**: `${{ needs.resolve-version.outputs.version }}`
            **Immutable release**: `https://github.com/${{ github.repository }}/releases/tag/${{ needs.resolve-version.outputs.tag }}`

      - name: Reconcile nightly alias release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          bash infra/scripts/release/upload-release-assets-with-retry.sh \
            "${{ github.repository }}" \
            nightly \
            all-artifacts

      - name: Attach release summary to job
        shell: bash
        run: |
          cat release-validation/artifact-versions-nightly.md >> "$GITHUB_STEP_SUMMARY"
          shopt -s nullglob
          for file in all-artifacts/release-summary-*.md; do
            cat "$file" >> "$GITHUB_STEP_SUMMARY"
          done

  preview-manifests:
    needs: [resolve-version]
    if: github.ref_name != 'main' || (github.event_name == 'workflow_dispatch' && !inputs.publish_live)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Install Node.js
        uses: ./.github/actions/setup-node

      - name: Wait for installer artifacts
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          node scripts/ci/wait-gh-artifacts.mjs \
            --artifact "installers-windows-x86_64" \
            --artifact "installers-macos-aarch64" \
            --artifact "installers-macos-x86_64" \
            --artifact "installers-linux-x86_64" \
            --interval-seconds 5 \
            --fail-job "package (windows-latest, windows, x86_64)" \
            --fail-job "package (macos-latest, macos, aarch64)" \
            --fail-job "package (macos-15-intel, macos, x86_64)" \
            --fail-job "package (ubuntu-latest, linux, x86_64)"

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: installers-*
          path: all-artifacts
          merge-multiple: true

      - name: Validate artifact versions
        run: |
          node infra/scripts/release/validate-release-artifact-versions.mjs \
            --artifacts-dir all-artifacts \
            --channel nightly \
            --version "${{ needs.resolve-version.outputs.version }}" \
            --output-dir manifest-validation

      - name: Dry-run release asset reconciliation
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bash infra/scripts/release/upload-release-assets-with-retry.sh \
            --dry-run \
            "${{ github.repository }}" \
            "${{ needs.resolve-version.outputs.tag }}" \
            all-artifacts
          bash infra/scripts/release/prune-release-assets-with-retry.sh \
            --dry-run \
            "${{ github.repository }}" \
            nightly
          bash infra/scripts/release/upload-release-assets-with-retry.sh \
            --dry-run \
            "${{ github.repository }}" \
            nightly \
            all-artifacts

      - name: Generate preview update manifests
        shell: bash
        run: |
          VERSION="${{ needs.resolve-version.outputs.version }}"
          TAG="${{ needs.resolve-version.outputs.tag }}"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}"

          generate_manifest() {
            local target=$1 arch=$2 filename=$3 format=$4
            local sig_file="all-artifacts/${filename}.sig"
            local signature='""'
            if [ -f "$sig_file" ]; then
              signature=$(jq -Rs . < "$sig_file")
            fi

            mkdir -p "nightly/${target}"
            cat > "nightly/${target}/${arch}.json" <<MANIFEST
          {
            "version": "${VERSION}",
            "url": "${BASE_URL}/${filename}",
            "signature": ${signature},
            "format": "${format}"
          }
          MANIFEST
          }

          generate_manifest "windows" "x86_64" "aura-os-desktop_${VERSION}_x64-setup.exe" "nsis"
          generate_manifest "macos" "aarch64" "aura-os-desktop_${VERSION}_aarch64.app.tar.gz" "app"
          generate_manifest "macos" "x86_64" "aura-os-desktop_${VERSION}_x86_64.app.tar.gz" "app"
          generate_manifest "linux" "x86_64" "aura-os-desktop_${VERSION}_x86_64.AppImage" "appimage"

          mkdir -p downloads
          cat > downloads/nightly.json <<MANIFEST
          {
            "channel": "nightly",
            "version": "${VERSION}",
            "release_url": "https://github.com/${{ github.repository }}/releases/tag/${TAG}",
            "generated_at": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "desktop": {
              "windows": {
                "url": "https://github.com/${{ github.repository }}/releases/download/${TAG}/aura-os-desktop_${VERSION}_x64-setup.exe"
              },
              "mac": {
                "apple-silicon": {
                  "url": "https://github.com/${{ github.repository }}/releases/download/${TAG}/AURA_${VERSION}_aarch64.dmg"
                },
                "intel": {
                  "url": "https://github.com/${{ github.repository }}/releases/download/${TAG}/AURA_${VERSION}_x64.dmg"
                }
              },
              "linux": {
                "url": "https://github.com/${{ github.repository }}/releases/download/${TAG}/aura-os-desktop_${VERSION}_x86_64.AppImage"
              }
            }
          }
          MANIFEST

      - name: Validate preview manifests
        run: |
          node infra/scripts/release/desktop-manifest-validate.mjs \
            --root-dir . \
            --channel nightly \
            --output-dir manifest-validation

      - name: Validate preview download manifest
        run: |
          node infra/scripts/release/desktop-downloads-validate.mjs \
            --manifest downloads/nightly.json \
            --artifacts-dir all-artifacts \
            --channel nightly \
            --output-dir manifest-validation

      - name: Attach preview manifest summary
        shell: bash
        run: |
          {
            echo "## Nightly Preview Mode"
            echo ""
            echo "- Publish skipped because this run was started in validation mode."
            echo ""
            cat manifest-validation/desktop-manifests-nightly.md
            echo ""
            cat manifest-validation/desktop-downloads-nightly.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload preview manifests
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: nightly-preview-manifests
          path: |
            nightly/**
            downloads/**
            manifest-validation/**

  publish-manifests:
    needs: [resolve-version, package, release]
    if: github.ref_name == 'main' || (github.event_name == 'workflow_dispatch' && inputs.publish_live)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          path: repo

      - uses: actions/checkout@v5
        with:
          ref: gh-pages
          fetch-depth: 0
          path: pages

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 25.9.0

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: installers-*
          path: all-artifacts
          merge-multiple: true

      - name: Validate artifact versions
        run: |
          cd repo
          node infra/scripts/release/validate-release-artifact-versions.mjs \
            --artifacts-dir ../all-artifacts \
            --channel nightly \
            --version "${{ needs.resolve-version.outputs.version }}" \
            --output-dir ../manifest-validation

      - name: Generate update manifests
        shell: bash
        run: |
          cd repo
          VERSION="${{ needs.resolve-version.outputs.version }}"
          TAG="${{ needs.resolve-version.outputs.tag }}"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}"

          generate_manifest() {
            local target=$1 arch=$2 filename=$3 format=$4
            local sig_file="../all-artifacts/${filename}.sig"
            local signature='""'
            if [ -f "$sig_file" ]; then
              signature=$(jq -Rs . < "$sig_file")
            fi

            mkdir -p "../pages/nightly/${target}"
            cat > "../pages/nightly/${target}/${arch}.json" <<MANIFEST
          {
            "version": "${VERSION}",
            "url": "${BASE_URL}/${filename}",
            "signature": ${signature},
            "format": "${format}"
          }
          MANIFEST
          }

          generate_manifest "windows" "x86_64" "aura-os-desktop_${VERSION}_x64-setup.exe" "nsis"
          generate_manifest "macos" "aarch64" "aura-os-desktop_${VERSION}_aarch64.app.tar.gz" "app"
          generate_manifest "macos" "x86_64" "aura-os-desktop_${VERSION}_x86_64.app.tar.gz" "app"
          generate_manifest "linux" "x86_64" "aura-os-desktop_${VERSION}_x86_64.AppImage" "appimage"

          mkdir -p "../pages/downloads"
          cat > "../pages/downloads/nightly.json" <<MANIFEST
          {
            "channel": "nightly",
            "version": "${VERSION}",
            "release_url": "https://github.com/${{ github.repository }}/releases/tag/${TAG}",
            "generated_at": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "desktop": {
              "windows": {
                "url": "https://github.com/${{ github.repository }}/releases/download/${TAG}/aura-os-desktop_${VERSION}_x64-setup.exe"
              },
              "mac": {
                "apple-silicon": {
                  "url": "https://github.com/${{ github.repository }}/releases/download/${TAG}/AURA_${VERSION}_aarch64.dmg"
                },
                "intel": {
                  "url": "https://github.com/${{ github.repository }}/releases/download/${TAG}/AURA_${VERSION}_x64.dmg"
                }
              },
              "linux": {
                "url": "https://github.com/${{ github.repository }}/releases/download/${TAG}/aura-os-desktop_${VERSION}_x86_64.AppImage"
              }
            }
          }
          MANIFEST

      - name: Validate nightly update manifests
        run: |
          cd repo
          node infra/scripts/release/desktop-manifest-validate.mjs \
            --root-dir ../pages \
            --channel nightly \
            --output-dir ../manifest-validation

      - name: Validate nightly download manifest
        run: |
          cd repo
          node infra/scripts/release/desktop-downloads-validate.mjs \
            --manifest ../pages/downloads/nightly.json \
            --artifacts-dir ../all-artifacts \
            --channel nightly \
            --output-dir ../manifest-validation

      - name: Attach nightly manifest summary
        shell: bash
        run: |
          cat manifest-validation/artifact-versions-nightly.md >> "$GITHUB_STEP_SUMMARY"
          cat manifest-validation/desktop-manifests-nightly.md >> "$GITHUB_STEP_SUMMARY"
          cat manifest-validation/desktop-downloads-nightly.md >> "$GITHUB_STEP_SUMMARY"

      - name: Commit and push manifests
        run: |
          cd pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nightly/ downloads/nightly.json
          git diff --cached --quiet || git commit -m "Update nightly manifests for ${{ needs.resolve-version.outputs.version }}"
          git push
