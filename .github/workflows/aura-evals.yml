name: Aura Functional Evals

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_live_benchmark:
        description: "Run the live autonomous-build benchmark lane"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  evals-registry:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 25.9.0

      - name: Validate eval lane registry
        run: node scripts/ci/validate-evals-registry.mjs

  smoke:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: interface

    steps:
      - uses: actions/checkout@v5

      - name: Install Node.js
        uses: ./.github/actions/setup-node
        with:
          cache: npm
          cache-dependency-path: interface/package-lock.json

      - name: Run smoke evals entrypoint
        if: always()
        run: node ../scripts/ci/verify-evals.mjs smoke

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: aura-evals-smoke
          path: |
            interface/playwright-report
            interface/test-results

  workflow-e2e:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: interface

    steps:
      - uses: actions/checkout@v5

      - name: Install Node.js
        uses: ./.github/actions/setup-node
        with:
          cache: npm
          cache-dependency-path: interface/package-lock.json

      - name: Run workflow evals entrypoint
        if: always()
        run: node ../scripts/ci/verify-evals.mjs workflow

      - name: Upload workflow artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: aura-evals-workflow
          path: |
            interface/playwright-report
            interface/test-results

  chat-core:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: interface

    steps:
      - uses: actions/checkout@v5

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 25.9.0
          cache: npm
          cache-dependency-path: interface/package-lock.json

      - name: Run chat core evals entrypoint
        if: always()
        run: node ../scripts/ci/verify-evals.mjs chat-core

      - name: Upload chat core artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: aura-evals-chat-core
          path: |
            interface/playwright-report
            interface/test-results

  behavior-evals:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra/evals/promptfoo

    steps:
      - uses: actions/checkout@v5

      - name: Install Node.js
        uses: ./.github/actions/setup-node
        with:
          cache: npm
          cache-dependency-path: infra/evals/promptfoo/package-lock.json

      - name: Run behavior evals entrypoint
        run: node ../../../scripts/ci/verify-evals.mjs behavior

      - name: Upload behavior eval artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: aura-evals-behavior
          path: |
            infra/evals/reports/promptfoo-results.json

  bench-smoke:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: interface

    steps:
      - uses: actions/checkout@v5

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 25.9.0
          cache: npm
          cache-dependency-path: interface/package-lock.json

      - name: Run benchmark smoke entrypoint
        run: node ../scripts/ci/verify-evals.mjs bench-smoke

  live-benchmark:
    if: github.event_name == 'workflow_dispatch' && inputs.run_live_benchmark
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: interface

    steps:
      - uses: actions/checkout@v5

      - name: Install Node.js
        uses: ./.github/actions/setup-node
        with:
          cache: npm
          cache-dependency-path: interface/package-lock.json

      - name: Run live benchmark entrypoint
        if: always()
        env:
          AURA_EVAL_BASE_URL: ${{ secrets.AURA_EVAL_BASE_URL }}
          AURA_EVAL_USER_EMAIL: ${{ secrets.AURA_EVAL_USER_EMAIL }}
          AURA_EVAL_USER_PASSWORD: ${{ secrets.AURA_EVAL_USER_PASSWORD }}
        run: node ../scripts/ci/verify-evals.mjs live-benchmark

      - name: Upload live benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: aura-evals-live-benchmark
          path: |
            interface/playwright-report
            interface/test-results

  eval-results:
    name: Eval results (required)
    if: always()
    runs-on: ubuntu-latest
    needs:
      - evals-registry
      - smoke
      - workflow-e2e
      - chat-core
      - behavior-evals
      - bench-smoke
      - live-benchmark

    steps:
      - name: Check required eval jobs
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          node <<'NODE'
          const needs = JSON.parse(process.env.NEEDS_JSON);
          const optional = new Set(["live-benchmark"]);
          const failures = [];

          for (const [job, result] of Object.entries(needs)) {
            if (optional.has(job)) {
              if (!["success", "skipped"].includes(result.result)) {
                failures.push(`${job}: ${result.result}`);
              }
              continue;
            }

            if (result.result !== "success") {
              failures.push(`${job}: ${result.result}`);
            }
          }

          if (failures.length > 0) {
            console.error(`Eval failures: ${failures.join(", ")}`);
            process.exit(1);
          }

          console.log("All required eval jobs passed.");
          NODE
