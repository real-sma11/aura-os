name: Mobile Nightly GitHub Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish_live:
        description: "Publish the GitHub mobile nightly release"
        required: true
        default: false
        type: boolean
      platform:
        description: "Which mobile platform(s) to build"
        required: true
        default: android
        type: choice
        options:
          - android
          - ios
          - both

permissions:
  contents: write

concurrency:
  group: mobile-nightly-release
  cancel-in-progress: true

jobs:
  build-android:
    if: github.event_name != 'workflow_dispatch' || inputs.platform == 'android' || inputs.platform == 'both'
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_PACKAGE_NAME: ${{ secrets.ANDROID_PACKAGE_NAME }}
      VITE_ANDROID_DEFAULT_HOST: ${{ vars.VITE_ANDROID_DEFAULT_HOST }}
      VITE_NATIVE_DEFAULT_HOST: ${{ vars.VITE_NATIVE_DEFAULT_HOST }}
      VITE_MIXPANEL_TOKEN: ${{ vars.VITE_MIXPANEL_TOKEN }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 25.9.0
          cache: npm
          cache-dependency-path: interface/package-lock.json

      - name: Install Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Install Android SDK tools
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Install Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.2"

      - name: Check Android runtime parity
        run: node scripts/ci/check-runtime.mjs android --native --ruby

      - name: Install interface dependencies
        working-directory: interface
        run: npm ci

      - name: Install fastlane gems
        working-directory: interface/android
        run: bundle install --jobs 4 --retry 3

      - name: Resolve Android host defaults
        shell: bash
        run: |
          DEFAULT_HOST="${VITE_NATIVE_DEFAULT_HOST:-https://aura-os-t565.onrender.com}"
          echo "VITE_NATIVE_DEFAULT_HOST=${DEFAULT_HOST}" >> "$GITHUB_ENV"
          echo "VITE_ANDROID_DEFAULT_HOST=${VITE_ANDROID_DEFAULT_HOST:-$DEFAULT_HOST}" >> "$GITHUB_ENV"

      - name: Compute mobile nightly version
        id: version
        shell: bash
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="mobile-nightly.${SHORT_SHA}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Materialize Android upload keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > /tmp/aura-android-upload.jks
          echo "ANDROID_KEYSTORE_PATH=/tmp/aura-android-upload.jks" >> "$GITHUB_ENV"

      - name: Verify Android release secrets
        run: node scripts/ci/verify-android-release-secrets.mjs github_release

      - name: Build signed Android nightly APK
        working-directory: interface/android
        env:
          ANDROID_VERSION_CODE: ${{ github.run_number }}
          ANDROID_VERSION_NAME: ${{ steps.version.outputs.version }}
          APP_VERSION: ${{ steps.version.outputs.version }}
          APP_COMMIT: ${{ github.sha }}
          APP_CHANNEL: nightly
        run: bundle exec fastlane android github_release

      - name: Stage Android release artifact
        shell: bash
        run: |
          mkdir -p dist
          cp interface/android/app/build/outputs/apk/release/*.apk "dist/aura-mobile_${{ steps.version.outputs.version }}_android.apk"

      - name: Summarize Android release outputs
        run: |
          node infra/scripts/release/mobile-release-summary.mjs \
            --platform android \
            --mode ship \
            --output-dir mobile-release-summary \
            --roots interface/android/app/build/outputs

      - name: Attach Android release summary
        shell: bash
        run: cat mobile-release-summary/android-ship-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Android nightly artifacts
        uses: actions/upload-artifact@v5
        with:
          name: mobile-nightly-android
          if-no-files-found: error
          path: |
            dist/**
            mobile-release-summary/**

  build-ios:
    if: github.event_name == 'workflow_dispatch' && (inputs.platform == 'ios' || inputs.platform == 'both')
    runs-on: macos-26
    env:
      FASTLANE_SKIP_UPDATE_CHECK: "1"
      IOS_APP_STORE_CONNECT_KEY_ID: ${{ secrets.IOS_APP_STORE_CONNECT_KEY_ID }}
      IOS_APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.IOS_APP_STORE_CONNECT_ISSUER_ID }}
      IOS_APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.IOS_APP_STORE_CONNECT_KEY_BASE64 }}
      IOS_APP_STORE_CONNECT_TEAM_ID: ${{ secrets.IOS_APP_STORE_CONNECT_TEAM_ID }}
      IOS_APPLE_ID: ${{ secrets.IOS_APPLE_ID }}
      IOS_BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID }}
      IOS_BUILD_NUMBER: ${{ github.run_number }}
      IOS_DEVELOPER_TEAM_ID: ${{ secrets.IOS_DEVELOPER_TEAM_ID }}
      IOS_MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.IOS_MATCH_GIT_BASIC_AUTHORIZATION }}
      IOS_MATCH_GIT_BRANCH: ${{ secrets.IOS_MATCH_GIT_BRANCH }}
      IOS_MATCH_GIT_PRIVATE_KEY: ${{ secrets.IOS_MATCH_GIT_PRIVATE_KEY }}
      IOS_MATCH_GIT_URL: ${{ secrets.IOS_MATCH_GIT_URL }}
      MATCH_PASSWORD: ${{ secrets.IOS_MATCH_PASSWORD }}
      VITE_IOS_DEFAULT_HOST: ${{ vars.VITE_IOS_DEFAULT_HOST }}
      VITE_NATIVE_DEFAULT_HOST: ${{ vars.VITE_NATIVE_DEFAULT_HOST }}
      VITE_MIXPANEL_TOKEN: ${{ vars.VITE_MIXPANEL_TOKEN }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 25.9.0
          cache: npm
          cache-dependency-path: interface/package-lock.json

      - name: Install Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.2"

      # Match the TestFlight lane: Apple requires the iOS 26 SDK (Xcode 26+)
      # for App Store Connect uploads as of 2026-04-28, and we want our
      # nightly IPAs to be archived against the same toolchain.
      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.4.app

      - name: Print Xcode and SDK versions
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Check iOS runtime parity
        run: node scripts/ci/check-runtime.mjs ios --native --ruby

      - name: Install interface dependencies
        working-directory: interface
        run: npm ci

      - name: Install fastlane gems
        working-directory: interface/ios
        run: bundle install --jobs 4 --retry 3

      - name: Resolve iOS host defaults
        shell: bash
        run: |
          DEFAULT_HOST="${VITE_NATIVE_DEFAULT_HOST:-https://aura-os-t565.onrender.com}"
          echo "VITE_NATIVE_DEFAULT_HOST=${DEFAULT_HOST}" >> "$GITHUB_ENV"
          echo "VITE_IOS_DEFAULT_HOST=${VITE_IOS_DEFAULT_HOST:-$DEFAULT_HOST}" >> "$GITHUB_ENV"

      - name: Compute mobile nightly version
        id: version
        shell: bash
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="mobile-nightly.${SHORT_SHA}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build signed iOS nightly IPA
        timeout-minutes: 30
        working-directory: interface/ios
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
          APP_COMMIT: ${{ github.sha }}
          APP_CHANNEL: nightly
        run: bundle exec fastlane ios github_release

      - name: Stage iOS release artifact
        shell: bash
        run: |
          mkdir -p dist
          cp interface/ios/build/AURA.ipa "dist/aura-mobile_${{ steps.version.outputs.version }}_ios.ipa"

      - name: Summarize iOS release outputs
        run: |
          node infra/scripts/release/mobile-release-summary.mjs \
            --platform ios \
            --mode ship \
            --output-dir mobile-release-summary \
            --roots interface/ios/build

      - name: Attach iOS release summary
        shell: bash
        run: cat mobile-release-summary/ios-ship-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload iOS nightly artifacts
        uses: actions/upload-artifact@v5
        with:
          name: mobile-nightly-ios
          if-no-files-found: error
          path: |
            dist/**
            mobile-release-summary/**

      - name: Upload iOS build logs on failure
        if: failure() || cancelled()
        uses: actions/upload-artifact@v5
        with:
          name: mobile-nightly-ios-logs
          if-no-files-found: ignore
          path: |
            /Users/runner/Library/Logs/gym/**
            interface/ios/build/**

  release:
    needs:
      - build-android
      - build-ios
    if: |
      always() &&
      (
        github.ref_name == 'main' ||
        (github.event_name == 'workflow_dispatch' && inputs.publish_live)
      ) &&
      (
        (needs.build-android.result == 'success' || needs.build-android.result == 'skipped') &&
        (needs.build-ios.result == 'success' || needs.build-ios.result == 'skipped')
      ) &&
      (
        needs.build-android.result == 'success' ||
        needs.build-ios.result == 'success'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Compute mobile nightly version
        id: version
        shell: bash
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "version=mobile-nightly.${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Download mobile artifacts
        uses: actions/download-artifact@v5
        with:
          path: mobile-artifacts
          merge-multiple: true

      - name: Create or update mobile nightly release
        id: release_mobile_nightly
        uses: softprops/action-gh-release@v2
        continue-on-error: true
        with:
          tag_name: mobile-nightly
          name: "Mobile Nightly (${{ steps.version.outputs.version }})"
          draft: false
          prerelease: true
          make_latest: false
          files: mobile-artifacts/**/*
          body: |
            Automated mobile nightly build from `main` at ${{ github.sha }}.

            **Version**: `${{ steps.version.outputs.version }}`

            Assets:
            - Includes the mobile artifacts produced by the successful jobs in this run.
            - Pushes to `main` currently publish the Android APK automatically.
            - iOS IPA publication to this GitHub Release remains manual-only via workflow dispatch.

      - name: Reconcile mobile nightly release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          bash infra/scripts/release/upload-release-assets-with-retry.sh \
            "${{ github.repository }}" \
            mobile-nightly \
            mobile-artifacts

      - name: Attach mobile release summaries
        shell: bash
        run: |
          shopt -s nullglob
          for file in mobile-artifacts/*-ship-summary.md; do
            cat "$file" >> "$GITHUB_STEP_SUMMARY"
          done
