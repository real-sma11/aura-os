name: Publish Release Changelog

on:
  workflow_run:
    workflows:
      - Desktop Nightly Release
      - Desktop Stable Release
    types:
      - completed
  workflow_dispatch:
    inputs:
      release_run_id:
        description: "GitHub Actions run id for the completed desktop release to publish changelog for"
        required: true
        type: string

permissions:
  actions: write
  contents: write

concurrency:
  group: publish-release-changelog-${{ github.event.workflow_run.id || inputs.release_run_id || github.run_id }}
  cancel-in-progress: true

jobs:
  publish-changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve triggering release run
        id: trigger
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            echo "run_id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
            echo "head_sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
            echo "workflow_name=${{ github.event.workflow_run.name }}" >> "$GITHUB_OUTPUT"
            echo "conclusion=${{ github.event.workflow_run.conclusion }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          run_id="${{ inputs.release_run_id }}"
          if [[ -z "$run_id" ]]; then
            echo "workflow_dispatch requires release_run_id" >&2
            exit 1
          fi

          response="$(gh api repos/${{ github.repository }}/actions/runs/${run_id})"
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          echo "head_sha=$(jq -r '.head_sha' <<<"$response")" >> "$GITHUB_OUTPUT"
          echo "workflow_name=$(jq -r '.name' <<<"$response")" >> "$GITHUB_OUTPUT"
          echo "conclusion=$(jq -r '.conclusion' <<<"$response")" >> "$GITHUB_OUTPUT"

      - name: Check whether the triggering workflow published a release
        id: release-check
        if: steps.trigger.outputs.conclusion == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          response="$(gh api repos/${{ github.repository }}/actions/runs/${{ steps.trigger.outputs.run_id }}/jobs --paginate)"
          if jq -e '.jobs[] | select(.name == "release" and .conclusion == "success")' >/dev/null <<<"$response"; then
            echo "released=true" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip changelog publish when the triggering run did not create a release
        if: steps.trigger.outputs.conclusion != 'success' || steps.release-check.outputs.released != 'true'
        run: echo "Triggering workflow did not publish a release. Skipping changelog publish."

      - name: Preflight changelog generation configuration
        if: steps.release-check.outputs.released == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        shell: bash
        run: |
          if [[ -z "$ANTHROPIC_API_KEY" ]]; then
            echo "ANTHROPIC_API_KEY is not configured. Publish Release Changelog cannot generate a changelog without it." >&2
            exit 1
          fi

      - uses: actions/checkout@v5
        if: steps.release-check.outputs.released == 'true'
        with:
          ref: ${{ steps.trigger.outputs.head_sha }}
          fetch-depth: 0
          path: repo

      - uses: actions/checkout@v5
        if: steps.release-check.outputs.released == 'true'
        with:
          ref: ${{ github.ref }}
          fetch-depth: 1
          path: workflow

      - uses: actions/checkout@v5
        if: steps.release-check.outputs.released == 'true'
        with:
          ref: gh-pages
          fetch-depth: 0
          path: pages

      - name: Install Node.js
        if: steps.release-check.outputs.released == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 25.9.0

      - name: Download release artifacts from the triggering run
        if: steps.release-check.outputs.released == 'true'
        uses: actions/download-artifact@v5
        with:
          pattern: installers-*
          path: all-artifacts
          merge-multiple: true
          run-id: ${{ steps.trigger.outputs.run_id }}
          github-token: ${{ github.token }}

      - name: Download release metadata from the triggering run
        if: steps.release-check.outputs.released == 'true'
        continue-on-error: true
        uses: actions/download-artifact@v5
        with:
          name: release-metadata
          path: release-metadata
          run-id: ${{ steps.trigger.outputs.run_id }}
          github-token: ${{ github.token }}

      - name: Determine changelog metadata
        if: steps.release-check.outputs.released == 'true'
        id: metadata
        shell: bash
        run: |
          case "${{ steps.trigger.outputs.workflow_name }}" in
            "Desktop Nightly Release"|"Release Nightly")
              expected_channel="nightly"
              ;;
            "Desktop Stable Release"|"Release Stable")
              expected_channel="stable"
              ;;
            *)
              echo "Unsupported triggering workflow: ${{ steps.trigger.outputs.workflow_name }}" >&2
              exit 1
              ;;
          esac

          extract_version() {
            local filename="$1"
            local artifact_version

            case "$filename" in
              aura-os-desktop_*_x64-setup.exe)
                artifact_version="${filename#aura-os-desktop_}"
                printf '%s\n' "${artifact_version%_x64-setup.exe}"
                ;;
              aura-os-desktop_*_x86_64.AppImage)
                artifact_version="${filename#aura-os-desktop_}"
                printf '%s\n' "${artifact_version%_x86_64.AppImage}"
                ;;
              aura-os-desktop_*_amd64.deb)
                artifact_version="${filename#aura-os-desktop_}"
                printf '%s\n' "${artifact_version%_amd64.deb}"
                ;;
              AURA_*_aarch64.dmg|Aura_*_aarch64.dmg)
                artifact_version="${filename#*_}"
                printf '%s\n' "${artifact_version%_aarch64.dmg}"
                ;;
              AURA_*_x64.dmg|Aura_*_x64.dmg)
                artifact_version="${filename#*_}"
                printf '%s\n' "${artifact_version%_x64.dmg}"
                ;;
              *)
                return 1
                ;;
            esac
          }

          shopt -s nullglob
          artifact_version=""

          for path in all-artifacts/*; do
            filename="${path##*/}"
            current_version="$(extract_version "$filename")" || continue

            if [[ -z "$artifact_version" ]]; then
              artifact_version="$current_version"
              continue
            fi

            if [[ "$artifact_version" != "$current_version" ]]; then
              echo "Mismatched release versions across installer artifacts: ${artifact_version} vs ${current_version}" >&2
              exit 1
            fi
          done

          if [[ -z "$artifact_version" ]]; then
            echo "Could not determine release version from downloaded artifacts" >&2
            exit 1
          fi

          metadata_file="release-metadata/release-metadata.json"
          if [[ -f "$metadata_file" ]]; then
            channel="$(jq -er '.channel' "$metadata_file")"
            version="$(jq -er '.version' "$metadata_file")"
            tag="$(jq -er '.tag' "$metadata_file")"
            release_url="$(jq -er '.release_url' "$metadata_file")"
            workflow_name="$(jq -er '.workflow' "$metadata_file")"

            if [[ "$channel" != "$expected_channel" ]]; then
              echo "Release metadata channel ${channel} did not match expected ${expected_channel}" >&2
              exit 1
            fi

            if [[ "$workflow_name" != "${{ steps.trigger.outputs.workflow_name }}" ]]; then
              echo "Release metadata workflow ${workflow_name} did not match triggering workflow ${{ steps.trigger.outputs.workflow_name }}" >&2
              exit 1
            fi

            if [[ "$version" != "$artifact_version" ]]; then
              echo "Release metadata version ${version} did not match installer artifact version ${artifact_version}" >&2
              exit 1
            fi

            if [[ "$tag" != "v${version}" ]]; then
              echo "Release metadata tag ${tag} did not match version ${version}" >&2
              exit 1
            fi

            expected_release_url="https://github.com/${{ github.repository }}/releases/tag/${tag}"
            if [[ "$release_url" != "$expected_release_url" ]]; then
              echo "Release metadata release_url ${release_url} did not match expected ${expected_release_url}" >&2
              exit 1
            fi
          else
            channel="$expected_channel"
            version="$artifact_version"
            tag="v${version}"
            release_url="https://github.com/${{ github.repository }}/releases/tag/${tag}"
          fi

          echo "channel=${channel}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "release_url=${release_url}" >> "$GITHUB_OUTPUT"

      - name: Generate release changelog
        if: steps.release-check.outputs.released == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CHANGELOG_TIMEZONE: America/Los_Angeles
        run: |
          node repo/infra/scripts/release/generate-daily-changelog.mjs \
            --repo-dir repo \
            --pages-dir pages \
            --artifacts-dir all-artifacts \
            --repo aura-os \
            --channel "${{ steps.metadata.outputs.channel }}" \
            --version "${{ steps.metadata.outputs.version }}" \
            --release-url "${{ steps.metadata.outputs.release_url }}"

      - name: Attach changelog summary
        if: steps.release-check.outputs.released == 'true'
        shell: bash
        run: |
          cat "pages/changelog/${{ steps.metadata.outputs.channel }}/latest.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Plan changelog media candidates
        if: steps.release-check.outputs.released == 'true'
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        shell: bash
        run: |
          node repo/interface/scripts/plan-changelog-media.mjs \
            --changelog-file "pages/changelog/${{ steps.metadata.outputs.channel }}/latest.json" \
            --output-dir changelog-media-plan

      - name: Upload changelog media plan
        if: steps.release-check.outputs.released == 'true' && hashFiles('changelog-media-plan/media-plan-summary.json') != ''
        uses: actions/upload-artifact@v5
        with:
          name: changelog-media-plan
          path: changelog-media-plan

      - name: Write changelog publish metadata
        if: steps.release-check.outputs.released == 'true'
        shell: bash
        run: |
          channel="${{ steps.metadata.outputs.channel }}"
          version="${{ steps.metadata.outputs.version }}"
          date="$(jq -er '.date' "pages/changelog/${channel}/latest.json")"
          mkdir -p changelog-publish-metadata
          jq -n \
            --arg channel "$channel" \
            --arg version "$version" \
            --arg date "$date" \
            --arg latest_json "changelog/${channel}/latest.json" \
            --arg latest_md "changelog/${channel}/latest.md" \
            --arg history_json "changelog/${channel}/history/${date}.json" \
            --arg history_md "changelog/${channel}/history/${date}.md" \
            '{
              channel: $channel,
              version: $version,
              date: $date,
              files: {
                latestJson: $latest_json,
                latestMd: $latest_md,
                historyJson: $history_json,
                historyMd: $history_md
              }
            }' > changelog-publish-metadata/changelog-publish-metadata.json

      - name: Upload changelog publish metadata
        if: steps.release-check.outputs.released == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: changelog-publish-metadata
          path: changelog-publish-metadata/changelog-publish-metadata.json

      - name: Commit and push changelog
        if: steps.release-check.outputs.released == 'true'
        shell: bash
        run: |
          bash workflow/infra/scripts/release/commit-gh-pages-with-retry.sh \
            pages \
            "Update ${{ steps.metadata.outputs.channel }} changelog for ${{ steps.metadata.outputs.version }}" \
            "changelog/${{ steps.metadata.outputs.channel }}"

      - name: Note changelog media handoff
        if: steps.release-check.outputs.released == 'true'
        shell: bash
        run: |
          {
            echo "## Changelog Media"
            echo ""
            echo "The changelog has been published first so release notes are never blocked by media generation."
            echo "Publish Release Changelog Media will run after this workflow succeeds, skip entries that already have published media, and only publish assets that pass capture, branding, and vision gates."
          } >> "$GITHUB_STEP_SUMMARY"
