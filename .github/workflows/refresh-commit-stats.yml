name: Refresh Changelog Commit Stats

# Keeps the marketing /changelog "Commits this month" / "Releases this
# month" figures current between releases. The commit/release snapshot
# (`commit-stats.json` on gh-pages) is otherwise only regenerated by the
# release pipeline, so at the start of a new month - before any release
# lands - both counters sit at 0 even while commits keep landing. Running
# on every push to main republishes the snapshot with the current PST
# month key and up-to-date counts.

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      reason:
        description: "Optional note for why the snapshot is being refreshed"
        required: false
        default: ""
        type: string

permissions:
  contents: write

# Coalesce bursts of pushes: only the latest refresh needs to win.
concurrency:
  group: refresh-commit-stats
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          path: repo

      - uses: actions/checkout@v5
        with:
          ref: gh-pages
          fetch-depth: 0
          path: pages

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 25.9.0

      - name: Refresh changelog commit-count snapshot
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          node repo/infra/scripts/release/generate-commit-stats.mjs \
            --pages-dir pages

      - name: Commit and push refreshed snapshot
        shell: bash
        run: |
          message="Refresh changelog commit-stats"
          if [[ -n "${{ inputs.reason }}" ]]; then
            message="${message}: ${{ inputs.reason }}"
          fi

          bash repo/infra/scripts/release/commit-gh-pages-with-retry.sh \
            pages \
            "$message" \
            "commit-stats.json"

      - name: Attach refresh summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Changelog Commit Stats Refresh"
            echo
            if [[ -f pages/commit-stats.json ]]; then
              echo '```json'
              cat pages/commit-stats.json
              echo '```'
            else
              echo "- No commit-stats.json present (all fetches failed and no prior snapshot)."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
